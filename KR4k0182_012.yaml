body:
  text: 第十二回西湖玩月續春遊詩曰富貴由來自在天達人識破始悠然好花於樹終須落明月一年得幾圓有酒莫教杯放去進山且與目留連滄桑變幻知何盡行樂春秋便是仙且説柳友梅自別了春花女回到寓所不覺神情恍惚如在夢裏暗想道夜來若主意一差豈不前功盡棄幸喜還把握得定只是我看此女姿容如名花繫念情思如飛鳥依人使我心醉魂消于梅雪姻緣外又添出一段相思之苦不一時只見抱琴隨著竹鳳阿一同來到寓所竹鳳阿道昨見華翰寵顧不知吾兄要銀何用及問尊使方知吾兄成此盛德之事小弟亦樂觀其成為此親自送來説罷便叫抱琴取出銀子竹鳳阿道銀子倒是一百在此恐吾兄資李缺乏因此多帶幾兩以足吾兄之用柳友梅道吾兄慷慨如此真不減鮑叔之高情矣柳友梅就將五十兩叫抱琴送到李媽媽家去卻説春花女別了柳友梅進去對著母親道世間有這樣好人昨夜我幾番勸誘他他並無邪念好一個正人君子及至孩兒把終身相托他又許我明行婚娶若負前盟有如此月深情厚德真令人寤寐難忘李老婦道柳相公行如此陰德又如此多情他日前程萬里正未可料我兒即做他一個婢妾也有榮耀正説間只見抱琴已將五十兩頭送來李老婦連忙接住道世上難得你相公這樣好人老身舉家感戴抱琴道我家相公生平極肯濟人患難凡遇人有事就像自身上的一般抱琴交付了銀子去了李老婦就把銀子去納足了官上下使用又去了數金真個錢可通神就放了李半仙出來這一番父子團圓夫妻完聚哪一個不感柳友梅的恩德次日李半仙也親到柳友梅寓所拜謝不題正是濟人須濟急救人須救徹不有拿雲手網羅誰解結且説柳友梅自救了春花女一家冥冥之中又添了許多陰德囊資短少又喜有竹鳳阿乃是一個好施的朋友與他一力周旋雖姻緣成就不在他的心上卻記春花女之言與母親慈訓暗合遂安心讀書以圖進取卻好提學考過發案日學院李念臺面行發落把柳友梅的文字大加稱賞高高的又取了一個第一只因科考一日不見了劉有美張良卿及發案日又不見二人柳友梅甚不放心細細打聽方知已同進京納監去了時光易過倏忽之間早又秋試之期柳友梅隨衆應試就約了楊連城竹鳳阿等一同赴試到了八月十五日三場完畢柳友梅出來對著楊連城竹鳳阿道今試事已畢揭曉又還有幾日功名自有天命當此秋光皎潔月華叫媚之時兩湖之景比春日正妍真可樂也竹鳳阿道文戰己畢正宜登山臨水以洗滌塵襟楊連城道好舒秋興以續春遊三人各各有興柳友梅便叫抱琴發了行李鼓棹往西湖遊玩這一番再來西湖景致比那二月間更自不同但覺江流有聲斷橋垂露山高月小波清煙素是日八月既中秋月光正圓放舟至湖天影將暮三人到了心曠神怡把酒臨風豪興自別但見銀湖明月空澄萬丈水光寒木丞棹笙歌宛轉數聲山樹碧長煙橫素練迷離繞堤畔殘楊秋氣斂晴空皎潔擬斷橋積雪金風動玉露浮疑是廣寒宮闕通碧梧深素波靜恍如皓魄女仙來正是春來花柳還如昨秋湖山水便不同柳友梅看了想起當日湖上題詩的事便對楊竹二生道湖上題詩舟中窺美曾幾何時湖上頓易風景雲殊如同隔世不知玉人飄泊今又在何處也竹鳳阿道人有悲歡月常圓缺世事奇奇怪怪安能無變易之理且從來好事多磨良緣雖遂然佳人才子實天作之合又非人可預度柳友梅道但恐世態似秋雲人情如活水我想老劉與常輩何等相知隔日尚爾同舟明朝就如敵國人心難測一險至此安知今日他不另起風波竹鳳阿道只是謀事在人成事在天有何益處三人把酒對月又賞玩了一回不覺夜色將闌籟聲漸寂湖上遊船略略稀少柳友梅又同著楊連城竹鳳阿復攜酒到蘇公堤橋上把紅氈鋪下三人席地而坐飲酒望月但見萬里無雲月光如洗不一時彩霞鬥豔華色爭妍原來月是太陰之精到得秋氣皎潔時際白帝司令金風一動便華采異于常時是夜更闌人靜雲霞湊集那月裏的精神發見出來便結成一團華采千層秀麗分外光明柳友梅與楊連城竹鳳阿望見疑是月裏嫦娥裁下的綾羅錦繡又似那廣寒仙子舞罷的霓裳羽衣正是未曾身到蟾宮裏如在瑤台瓊屋中柳友梅看見歡喜不盡便對楊竹二生道昔賢蘇東坡中秋望月曾有二詞一首是念奴嬌一首是水調歌頭詞中意思若先獲我心者試歌一遍與二兄飲酒何如楊連城道得兄豪興如此真不辜負好月竹鳳阿道柳兄意思莫不是要借東坡詞句一吐胸中浩氣麼説罷柳友梅便把東坡二詞歌道念奴嬌憑高遠眺見長空萬里雲無留迹桂魄飛來光射處冷侵一天秋碧玉宇瓊樓乘鸞來去人在清涼國江山如畫望中煙樹歷歷我醉拍手狂歌舉杯邀月對影成三客起舞徘徊風露下今夕不知何夕便欲乘風翩然歸去何用騎鵬翼水晶宮裏吹斷一聲橫笛水調歌頭明月幾時有把酒問青天不知天上宮闕今夕是何年我欲乘風歸去又恐瓊樓玉宇高處不勝寒起舞弄清影何似在人間轉朱閣低綺戶照無眠不應有恨何事長向別時圓人有悲歡離合月有陰晴圓缺此事古難全但願人長久千里共蟬娟柳友梅把二詞對月浩歌音喉清亮響徹雲際每歌一字幾盡一刻飛鳥為之徘徊壯士聽而欲淚歌罷楊竹二生齊拍手道好歌好歌竹鳳阿道昔從東坡鏡心吟出今從柳兄繡口歌來深情遠韻聽者魂銷楊連城道若使坡仙聽得千載下又添一知己三人説説笑笑不覺露氣滿空暗侵衣袂真吃到大家酩酊但見東方欲白方才歸舟正是月為留人人意醉人因戀月月華妍年年月下人同玩歲歲人間月幾圓卻説柳友梅與楊竹二生西湖玩月之後又遊玩了數日方同回家到了揭曉之日柳友梅高高地中了浙省第一名解元報到家中楊氏夫人不勝歡喜及聞內侄楊連城也中了第五名的經魁益發喜出望外只有竹鳳阿不曾中得柳友梅深為扼腕竹鳳阿心上因不喜文倒也不在心上過幾日又去應武舉了雪太守聞知柳友梅中瞭解元也不勝歡喜自謂擇壻有限隨差人到金陵梅小姐處報喜順便就接雪公子並梅小姐一同回杭州李半仙聽説新解元就是柳友梅忙回去與女兒説知春花女亦滿心歡樂不題且説梅如玉小姐自扶樞回金陵去後就安葬了梅公心下便要回杭州又因思慕父親不忍遂別為此蹉跎過夏直到中秋又因雪公于納了南雍秋闈也不免就進去觀場為此耽擱過了八月望後哪曉得天下事竟有出自意外的雪公子年紀不止一十六歲文字倒也清通竟已三場完畢及到揭曉卻也中了第二十七名的文魁報到梅小姐家來梅小姐也不勝之喜恰好雪太守是日要差人往南京報喜那南京捷報雪公子的人早已到了雪太守看見了報人不覺驚喜交集説道我家公子小小年紀雖然納個南雍今年也只好觀場哪有僥幸就中之理報録的道這個難道好哄得老爺的雪太守喜出望外隨即打發了報録的卻好雪公子與梅小姐也到了這一日大排筵宴隨排了三桌酒在後衙嘯雪亭上雪太守與夫人坐了一桌如玉小姐與瑞雲小姐也合了一桌公子雪蓮馨因是日是個新貴雪太守因命他倒坐了一個獨桌這一日夫妻父子之樂甥舅姊妹之歡好不快活熱鬧梅如玉小姐雖然心上憶念梅公然是日聞知丈夫柳友梅已中解元心上也自歡喜一同飲宴真是閣家歡樂正在飲酒間忽門上報道稟老爺外面天使到太守忙排香案出來迎接只見四個校尉捧過聖旨開讀道朕聞成憲者祖宗之遺制功今者國家之大經凡爾臣工罔敢或逾今爾雪霽偽立私黨倡作詩詞背棄程法靡亂風俗廢本朝之盛典習晉唐之陋規祖宗成憲何存國家功令安在束力下錦衣衛拿問奏復讀罷四校尉就把雪太守去了冠帶上了刑具這一日就要動身雪公子聽得年幼不諳什事直驚呆了出堂來見父親拿下身系縲薰不覺就哭起來四校尉道你兒子是個舉人了快叫他弄些盤費與我今日就要動身的雪太守忙對雪公子道我兒你不用啼哭聖明在上我又無大故此去料沒什事只為這詩題一事起的禍根我去後可速速與你柳姐夫商議你雖年少幸喜已得成名但學問未足來春就要會試你須專意讀書以圖上進柳姐夫是才高學博的你當以師資相與方有益處我去家眷即發回蘇你就可同柳姐夫上京我去自有主張不必以我為念雪公子道只是爹爹此去前途保重凡事相機雪太守道這事我自有處不須你吩咐那校尉見無銀使用便立催起身原來雪太守雖做個黃堂卻因平日清廉竟無銀子又因雪蓮馨一中費用去了為此這一日雪公子勉強在內邊湊得一百兩銀子送與校尉權為路費校尉嫌少不要只得又在庫吏處湊了五十兩添打發了校尉校尉尚不足意便星夜促他起身雪夫人與二小姐在內衙聞知驚得無計可施不知禍從何起雪公子尚捨不得父親遂去苦苦懇留那校尉哪里肯放鬆只是立逼起身父子二人無可奈何只得分手灑淚而別正是歡處忽悲來喜後兼愁集世事夢中身人情雲裏月未知雪太守去後凶吉何如且聽下回分解
