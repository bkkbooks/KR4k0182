body:
  text: 夢花想清樵雲山人著序自有文字以來著書不一四書五經文之正絡也稗官野史文之支流也四書五經如人間家常茶飯可用不可缺稗官野中如世上山海珍饈爽口亦不可少如必謂四書五經方可讀而稗官野史不足閲是優可用家常茶飯而爽口尤珍饈矣不知四書五經不外飲食男女之事而稗官野史不無忠孝節義之談能通乎此則拈花可以生冰之清雪之潔柳之秀雅蓮之馨香可謂無花不飛矣湖上之逢舟中之句嘯雪亭尋梅問柳探花郎跨鳳乘龍可謂無想不豔矣以至梅雪二公忠勤王事竹楊二子慷慨多情張劉二生之詭計陰謀春花朝霞二女之慧心俠骨則歎不必謂四書五經方可讀也發想可以見奇不必謂稗官野史不足閲也但花必欲飛不飛不足奪目想必欲豔不豔不足嫌情何也無花不飛無想不豔亦無花不豔無想不飛方足以開人心花益人心想以為文士案頭之一助今傳中所載為梅何花不豔何想不飛或閲蓀傳者如逮名花同列豔媚雖桃李白而清香勝之為生奇想天際飛來雖水窮山盡而幻景出之如逢才子佳人歎有相對雖才為司馬慧似文君而風流喜雅卻又過之此飛花豔想之所由作也雖然花飛矣想豔矣亦花豔矣想飛矣偏于忠孝節義之淡而心及飲食男女之事是何愛拾日用山海珍饈而廢家常茶飯也是何愛拾只閲稗官野史而廢四書五經也其可乎若蓀傳者權必胸經邪必悔正花飛而氣自存想豔而文自正令人讀之猶見河洲窈窕之遺風則是書一出謂之閲稗官野史也可即謂之讀四書五經也亦可歲在己酉菊月未望樵雲山人書於芍藥溪目録第一回衆英才花下談心第二回柳秀士舟中題句第三回兩閨英湖上遇才郎第四回梅兵憲難途托嬌女第五回棲雲庵步月訪佳人第六回合歡亭入夢逢巫女第七回假張良暗計圖連理第八回慧文君識眼辨真才第九回重結鴛鴦雙得意第十回拆開梅雪兩分離第十一回占寺還金逢妙麗第十二回西湖玩月續春遊第十三回連及第馳名翰院第十四回為辭婚種禍邊庭第十五回擲金錢喜蔔歸期第十六回點宮秀暗添離恨第十七回雪蓮馨辭朝省母第十八回柳友梅衣錦還鄉
