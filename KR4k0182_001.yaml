body:
  text: 第一回衆英才花下談心詩曰雲山到處可舒襟風月間情試共尋世界白它場觀莫淺古今儡傀看須深春秋滿腹非無意笑罵皆文各有心不是千年明眼士當時芳臭孰知音話説嘉靖年間浙江紹興府山陰縣有一秀才姓柳名素心表字友梅原是唐朝柳宗元之後父親柳繼毅官至京兆尹不幸在十三歲上邊就亡過了母親楊氏賢能有志就苦心守節立志教柳友梅讀書日夜不輟真個是三更燈火五更雞雪案螢窗志足奇自古書香傳奕葉果然庭訓振家儀自幼的時節日間母親做些女工友梅便隨母侍讀夜間燃燈楊氏就課子讀書那咿我之聲往往與牙尺剪刀聲相間楊氏訓子之嚴無異孟母斷機友侮讀書之勤亦不啻歐陽畫荻友梅生得一表人材美如冠玉又且穎悟過人做的文章便篇篇錦繡字字珠璣十五歲上就領了錢塘縣學批首雖然他父親已故門庭冷落那友梅生性豪爽貧乏二字全不在他心上平日只以讀書做文為事或遇看花賞月臨水登山卻也做些詩詞自娛同輩朋友卻又嘖嘖稱羡他的才華生平因慕李太白的風流才品又取個別字月仙取謫仙愛月之意隱居山陰縣中那山陰的所在真個千巒競秀萬壑爭流無窮好景應接不暇友梅的住居卻彎彎抱著一帶流水遠著數點青山門栽幾樹垂楊宛似當年陶令宅徑植百竿翠竹依然昔日辟疆園月到梅花吟不盡林逋佳句杯浮緑葉飲不盡李白瓊漿曾有一詩單贊柳友梅的人才詩雲美如冠玉潤如珠倚馬文章七步詩錦繡心腸能月卒面山川秀麗見丰姿陳思妙句應無敵衛儀容差合宜一段風流誰得解能挑卓女醉西施又有一詩單贊柳友梅的住居門淹垂楊緑樹東小橋曲徑漫相通青山點點參雲表流水淙淙落澗中地産才郎知育秀花無俗氣自吟風當年欲訪幽人迹卻與西施舊宇逢原來柳友梅的住居就在當初範蠡訪西施的所在那浣紗遺迹至今尚存柳友梅性又愛梅他母親生他這日夢見梅花滿樹落滿懷中因此父親自小喚他是友梅後園中栽著無數梅花乃是他父親的手栽柳友梅生性愛梅凡遇梅花開放時節或把酒對花自斟自詠或攜朋挈友疊唱疊和興致最高臥房常時供一枝梅花古秀曲折令人描畫不就無梅時節更挂一幅梅花的單條墨花飛舞生氣飄動常自題其上雲吟成白雪心如素曼到梅花香也清昔日浣紗今日恨玉人如許願相親因這一首詩有分教陽春白雪詩中聯羅綺之緣柳豔梅香花下結鴛鴦之帶一日正值初春梅花競盛開滿園林也有兩葉的也有單瓣的也有緑萼也有玉疊或紅或白或老或嫩疏影橫斜暗香浮動引起那林和靖的風流鼓舞得孟浩然的興致昔賢高李迪有詩詠那梅花之妙瓊姿只合在瑤台誰向江南處處栽雪滿山中高士臥月明林下美人來寒依疏影瀟瀟竹春掩殘香漠漠苔自去何郎無好詠東風愁寂幾回開其二斷魂只有月明知無限春愁在一枝不共人言惟獨笑忽疑君到正相思花殘別院燒燈夜妝罷深宮覽鏡時舊夢已隨流水遠山窗聊復伴題詩柳友梅是日正在那裏把酒賞玩對花吟詠忽見小童抱琴走進來道外邊竹相公楊相公來訪原來竹楊二生就是友梅同筆硯的朋友竹生名幹霄表字鳳阿乃是兵部竹淇泉的嫡侄與柳友梅又是年家為人少年老成最重義氣且文武兼長楊生名懷璧字連城乃是柳友梅母親的內侄做人雅有情誼三人交往甚厚平日間不是你尋找便是我訪你柳友梅聽見説二人來訪忙出來迎接三人因平日往來慣了全無一點客套一見了柳友梅便笑説道兩日梅花開得十分爛漫二兄為何不來一賞竹鳳阿道前兩日因家叔父復命進京匆忙數日不得工夫昨日要來不期剛剛出門撞見老劉厭物拿一篇壽文立等要致與嚴相公夫人上壽他説頃間去柳兄處尋不見只得來央及兄又誤了一日工夫今早見風日晴和弟恐錯過花期所以約了楊兄不速而至楊生道小弟連日也為些俗冗羈絆未免辜負芳辰柳友梅道我説老劉昨日來尋必有緣故原來又要奉承權貴耳三人説著話待過茶遂邀進後園看梅果然清香撲鼻素色精神引起人無限興致真不減玉樹風前何異瑤台月下柳友梅即于花下展開一幅花箋吟詩一首詩雲素姿雅秀奪春開壓倒群花獨占魁影入月中矜玉色香濃雪裏動詩才淡籠煙水疑圖畫點綴瓊瑤勝剪裁無限深情誰得解相思不盡題相陪竹楊二生接詩吟玩俱誇獎道有此好花不可無此佳句更值芳辰對景知己談心今日可渭二美具四難並矣柳友梅道拙詠欠工還求和韻竹楊二生齊應道這個自然竹鳳阿隨即吟成一首和著柳友梅的韻題於錦箋上雲氣稟先天得早開名傳南國播花魁難凋三友冰霜操易賦千言珠玉才香冷暗侵高士臥影疏振約美人裁年來有子堪調鼎燮理陰陽可重陪柳友梅道鳳阿兄詩句聲門超卓絶無寒士氣鼎鼐才也楊連城看了也贊道詩情雄壯大有盛唐音韻非中晚可及隨即自己也展開一幅詩箋花前題就呈與柳楊二生柳友梅接來一看上寫雲欲識天心待雨開流芳已占百花魁一枝初試陽亨象數點中宣造化才遜雪難為郢客和鬥豔疑屬壽陽裁不須攀折相尋問半領春風得意陪柳友梅看罷贊道楊兄佳句當為翰苑仙才竹鳳阿道但觀末後一聯分明是春風得意看花長安之意了三人互相題詠賞玩了一回柳友梅就叫抱琴排上酒肴即於花下對酌飲了數杯竹鳳阿道此花秀而不豔美麗不妖衆花俱萎此獨淩寒自開萬木未榮此獨爭春先放雖然骨瘦姿清而一種瀟灑出塵之致自非凡花可及使人愛而敬之就如二兄與小弟交淡而自濃久而加敬終不似老劉這班俗子伺候侯門趨迎府縣未免為花所笑友梅道雖如此説只怕他又笑你我不為功名終日飲酒賦詩與草木為伍楊連城道他們笑我殊覺有理我們笑他便笑差了竹鳳阿道如何笑差楊連城道你我做秀才的無不博個脫白挂緑若弟輩功不成名不就又不會鑽刺又不去幹謁終日以詩酒陶情哪能個平地一聲雷便扶搖萬里去乎柳友梅道富貴從來有命讀書豈為功名昔曾文正公已做狀元人道他一生吃著不盡他尚雲我志不在溫飽據小弟看來功名還是易事尚有難於功名者耳竹鳳阿道柳兄妙才功名自易他日雲程自在玉堂金馬之內楊兄苦志螢窗埋頭雪案其功名亦自下小瀛洲奪錦雁塔題名應有日也若弟賦性愚魯意不在書志欲學劍當效班孟堅投筆覓個封侯萬里方遂生平尚未知遇合何如今友梅兄又説有難似功名的更是何謂柳友梅含笑道此心曲事難於顯言竹鳳阿道知己談心不妨傾腸倒肚何必拘擬就是小弟大言也是酒後狂愚不覺自陳肺腑吾兄何必如此隱藏楊連城也道既系心交不妨直道三人一邊説一邊飲酒柳生至此已飲了數杯不覺乘著酒興笑説道小弟想人有五倫弟不幸先父先亡又無兄弟五倫中已失了二倫君臣朋友間遇合有時若不娶一個絶色佳人為婦則是我柳友梅空為人在世一場枉讀了許多詩書埋沒了一腔情思便死也不甘心只是美玉藏輝明珠含媚天下雖有絶色佳人柳友梅哪能個一時便遇所以小弟説尚有難於功名耳楊竹二生齊道如兄之才怕沒有佳偶相諧麼只要功名到手耳柳友梅道兄等不要把功名看重佳人反看輕了古今凡傅金紫者無不是富貴而絶色佳人能有幾個有才無貌不可謂之佳人有貌無才不可謂之佳人即或有貌有才而于吾柳友梅無脈脈相契之情亦算不得吾柳友梅之佳人竹鳳阿道聽兄説來古詩雲傾國與傾城佳人難再得良有以也楊連城道昔相如見賞于文君李靖受知於紅拂佳人才子一世風流動成千古美淡事固有之柳友梅道小弟志願還不止此文君雖慧已非處子紅拂雖賢終為婢妾況琴心挑逗月夜私奔之事終屬不經若小弟決不為此楊竹二生道如此説來怪不得兄説難於功名矣三人談笑飲酒正説得情投意洽忽見抱琴進來道外面劉相公來訪三人聽見各不歡喜柳友梅便道蠢才曉得我與竹相公楊相公飲酒就該回不在家了抱琴道我也回他劉相公道我方到竹相公處問説在柳相公園中看梅故此特來又望見內園花色自要進來看花因此回不得了柳友梅尚沈吟不動只聽見劉有美已在前廳叫道友梅兄風阿兄好作樂柳友梅只得出來迎接原來這劉有美名斐然也是個挂名秀才勉強做幾句丑時文卻一味抄襲舊文鑽刺當道為人又且言語粗鄙外好濫交中藏險惡又因新斷了弦終日在外邊尋些露柳牆花品行一發不端了為此三人都憎厭他這一日走進來望見柳友梅便叫道柳兄好人一般通是朋友怎麼就分厚薄你既有好花在家邀老竹老楊來賞怎麼就不呼喚小弟一聲難道小弟就不是同學的朋友柳友梅道本該邀兄只恐兄貴人多忙無暇幹此寂寞事耳就是楊竹二兄也非小弟邀來不過是偶然小集兄若不棄嫌請同到小園一樂何如劉有美聽了一徑就同到後園竹鳳阿與楊連城看見只得起身相迎因説道今日劉兄為何有此清興劉有美與楊連城作揖道你一發不是人這樣快活所在為何瞞著我獨自來受用不通個通又與竹風阿作揖致謝道昨賴大才潤色可謂點鐵成金今早送與本縣趙老師看了便十分歡喜大加稱讚若送到嚴相公府中看了不知還有多少褒獎哩今小弟增光倘後有什麼余榮皆吾兄神力矣竹鳳阿道趙縣尊歡喜乃感兄高情厚禮未必便為這幾句文章劉有美道常言説秀才人情半張紙小弟寒儒賀相國之壽只有這壽文足矣倒沒有什麼厚禮楊連城道小弟瞞兄看花便怪小弟像吾兄登縣尊之堂拜相國夫人之壽拋撇小弟就不説了説罷衆人都笑起來原來那位夫人就是趙文華拜他做乾娘的因往天竺進香趙文華就接他到縣恰好正值他的生辰趙文華與他做起壽來便哄動了合縣的士夫劉有美是個極勢利的況又拜在趙文華門下因此做這篇壽文兼備些禮物去上壽只有柳友梅與竹鳳阿楊連城三人一般有傲氣的不去上壽那山陰縣的矜紳哪一個不去的這一日在席間提起劉有美道今日與趙老師令堂上壽雖是小弟背兄也是情禮上卻不過還有一事特來請三兄商議若是三兄肯助一臂之力保管有些好處柳友梅道有何好處見諭劉有美道嚴相國有一內親的令愛年已及笄曾與會稽縣朱世良割襟近日朱家家事消乏嚴相國的內親要趙老師作主替他另配一個女壻縣中人聞知紛紛揚揚説嚴府倚仗勢力謀賴婚姻人都不服我想這些人卻癡幹你什事會稽縣學中第一是老方出頭要替他女壻告狀趙老師聽得些風聲又不好發覺今日與小弟師弟至情偶然談及小弟想同學的朋友通好説話只有老方有些假道學又尚氣為人敢作敢為再不思前算後與小弟再説不來我曉得他與三兄極相契厚三兄若出一言阻擋了老方其壻徽商不諸這裏的事只合罷休不惟趙老師深感就是嚴府裏曉得了那婚事也有些意思包你宗師下來嚴相公自然薦舉今年科舉穩穩的了這是上門生意極討好且不費力竹鳳阿聽了心下便有幾分不快因正色道若論他倚仗嚴府勢力賴人婚姻就是老方不出頭小弟與兄也該持一公論事關風化如何劉兄反要與他周旋未免太勢利了劉有美見竹鳳阿辭色不順遂默默不語柳友梅道小弟只道劉兄今日特來看花原來又為著嚴府的公事這等便怪不得小弟不來邀兄賞梅了楊連城也笑道良辰美景只宜飲酒賦詩若是花下談俗事頗覺不雅劉兄該罰一世巨觴以謝唐突花神之罪劉有美被竹鳳阿搶白幾句已覺抱慚父見楊柳二生帶笑譏刺他甚沒意思只得勉強道小弟與竹兄偶然談及如何便有罰酒柳友梅道這個一定要罰叫抱琴斟上一大杯送與劉相公劉有美拿著酒説道小弟便受罰倘後有談及俗事者小弟也不饒他竹鳳阿道這個自然不消説劉有美吃幹酒看見席間筆墨淋漓便笑道看來三兄在此有興做詩何不見教柳友梅道弟輩詩已做完只求劉兄也做一首楊竹二生也道劉兄有興也和友梅兄原韻以見一時之勝劉有美道兄等又來奈何小弟了小弟于這七言八句實實來不得柳友梅道吾兄長篇壽文稱功頌德與相國夫人上壽偏來得為何這七言八句不過數十字就來不得想道知此梅花沒有薦舉麼劉有美便嚷道柳兄該罰十杯小弟談俗事便罰酒像老兄這等難道就罷了隨即斟了一大杯遞與柳友梅楊連城道若論説壽文也還算不得俗事竹鳳阿道壽文雖是壽文卻與俗事相關若不關俗事劉兄連壽文也不做了友梅兄該罰該罰柳友梅笑了笑把酒一飲而幹四人正在那裏飲酒賞玩抱琴走到呈上一個封筒上面用一個圖書柳友梅道是哪里傳來的抱琴道是錢塘學的齋人傳來説是杭州府雪太爺的詩題發到學裏為此特特傳來三日內就要繳去哩柳友梅就拆開一看原來是兩幅錦箋上寫兩個詩題一個是春閨一個是春郊首尾限韻首韻是個雨絲風片煙波畫船八字尾是西雞齊啼五字竹風阿道原來就是敝年伯出的這詩題出得有些意思友梅兄你道他為著什來柳友梅道這無非要征取詩篇觀賞人文的意思耳竹鳳阿道雖則如此據我想來另有深意恐出此題還不是敝年伯自出的劉有美笑道鳳阿兄又奇了若不是太尊出的諒一詩題請誰代筆楊連城道鳳阿兄與雪公在京邸時曾與素心晨夕他必然得知細裏柳友梅道原來如此一定要請教了竹鳳阿道今日天色已暮酒又深了且暫告別柳友梅尚欲留飲竹鳳阿道這倒不必了明日是二月花朝就是小弟作東屈三兄往西湖一棹乘此春光便好將此詩題我就好與三兄説明詩題的意思豈非上下兩得衆人齊道如此甚好四人即於花前分袂同作揖直出門而別正是一杯一杯復一杯幾人對酌山花開既醉欲眠君且去明朝有意抱琴來未知柳友梅遊湖何如且聽下回分解
