body:
  text: 第四回梅兵憲難途托嬌女詩曰緩急人生所不無全憑親友力相扶陳雪友誼幾知己嬰杵芳名爲托孤仗義終須仗義起奸讒到底伏讒辜是非豈獨天張主人事其間不可誣話說如玉小姐與雪夫人瑞雲小姐別後隨著梅兵備回船梅小姐接住梅公道日間汝舅舅邀我到昭慶寺賞梅不料未及終席人報提學院到你舅舅只得又去接他甚矣烏紗之苦皂隸之俗哉言未畢雪太守也到梅公接進船即命小姐拜見過坐畢雪太守道早間失陪多有獲罪前日學院發牌先考紹興不期今日就到敝郡固此小弟惟恐失迎只得去接他況李念台與小弟雖然也是年家爲人甚是古執既在宦途不得不如此姊丈托在至戚當相諒耳梅公道說哪里話你我既系至親當脫略虛文以真情相告那李念台點了浙直學院原與小弟同出京我也曾面囑他越地人文極盛幸爲小弟擇一佳婿今既到此他必不失信兄若進見時尚與我致意雪太守道領教領教只是目下還有一事小弟方才回衙見塘報甚是緊急說閩中一路山寇猖獗劫了庫殺了知府近日又沿及兩廣人心惶惑吾想吾兄此行正當汛地且有甥女年幼路途遙遠盜賊竊發如何去得梅公聽了撫髀加歎道閩寇作亂小弟離京時已聞此信小弟只爲權臣當道朝政日非因此討這個外差出來訪一佳婿以完小女終身就是小弟晚年也得半子相依不憂無靠不料佳婿未逢風波頓作這也是我命運使然詩不雲乎豈不懷歸畏此簡書今已王命在躬是有進無退了如玉小姐在傍聽見驚得面如土色半晌地不言不語不覺掉下淚來說道此事怎了雪太守道我兄是一定要去的只是甥女恐去個得莫若留到小弟衙齋暫住幾時俟平靜日送到任所何如梅公聞言說道吾兄之言正合愚意但只是小女自令姐去後無一刻不在膝下小弟此番出山也只爲擇婿而行誰料婿尚未得女又相離今者閩越山川道途險厄天涯父女至戚睽違心雖鐵石寧不悲乎雖承老舅厚誼見領小女但小弟此去多凶少吉尚不知父女相見何期言至此不覺撲簌簌之掉下幾點淚來如玉小姐與朝霞從旁聽見亦不覺潸然淚下如玉小姐道爹爹暮年且是文士當此賊寇猖獗之際爹爹深入虎口恐禍生叵測據孩兒看來爹爹何不急上疏告病還鄉或者聖明憐念另遣人去也未可知梅公歎道我豈不知但我爲嚴氏弄權討差出外這些有見識的也就紛紛告退眼見得朝廷已無人當此天步艱難之際內有權臣外養巨寇若不早除外患必致遺害腹心況此間賊寇名雖爲寇原系良民總爲饑寒逼迫賊類相扳以至於此我若此去當撫則撫當剿則剿誓必掃清巢穴以報國家我已備員兵選奉命出京又複不去這分明臨難退縮了不惟負罪名教且爲嚴黨所笑矣如何使得如玉小姐道爹爹所言俱爲臣大義非兒女所知只是爹爹此去水土異鄉乏人侍奉倘病竊發暮年難堪叫孩兒放心不下雪太守道父女離別自難爲情然事已至此已無可奈何姊丈既以甥女見托甥女即吾女兒也當擇一佳婿報命還有一話弟倒忘了前日姊丈見教的詩題極有趣味弟未及和已發到學裏去了吾想越中大郡定有美才不日文宗考試自拔一二佳士或者良緣有在得一佳婿也未可知甥女是個閨閣英流合配個文章魁首梅公聞言便改容拭淚道聞兄之言頓開茅塞若肯爲小弟擇一佳婿小弟雖死異域亦含笑矣因看著如玉小姐道我明日送你到舅舅衙中不必說是舅舅只以父女稱呼便好爲你尋親如玉小姐道孩兒既蒙嫡親舅舅收管就如母親在得一般料然安妥只望爹爹盡心王事以靖群醜則侍奉有日萬勿以孩兒爲念梅公道你既有托我已心安我閩中此去七尺之軀悉聽於天矣今夜尚圖相聚明日便一片征帆千里關山耳且將酒來我與舅舅痛飲幾杯以敍別情正是江洲衫袖千年淚易水衣冠萬古愁莫道英雄不下淚英雄有淚只偷流左右斟上酒二人共飲了一回不覺更深雪太守徑道回府梅公吩咐小姐道你今夜收拾停當明日好到舅舅府中去小姐聽了不敢違拗即忙打點次早梅公叫兩乘轎一乘坐小姐一乘自坐親送到雪太守府裏來雪太守已著人伺候接進後衙梅公就叫如玉小姐拜了雪太守四拜隨即與雪太守也是四拜說道骨肉之情千金之托俱在於此雪太守道姊丈但請放心小弟決不辱命如玉小姐心下興咽一句話也說不出只是掩淚而已雪太守即令治飯梅公道小弟倒不敢領了一則憑限要緊一則已唯午時解維停不得了雪太守道暫奏一杯聊作渭城三唱以壯行色叫左右斟上酒來雪太守恭上梅公接了酒道今日與吾兄小女一別未知何日相逢雪太守道吉人自有天相不日掃清小蠢便可榮升不須憂慮一連飲了三杯梅公也回敬一杯就要起身如玉小姐含淚拜別梅公亦泣然淚下只得吞聲而別正是世上萬般苦楚事無非死別與生離雪太守與梅公直送出錢塘門方別正是人事無端複雲雨天心有意合姻緣待看雨散雲收後一段良緣降自天未知後來何如且聽下回分解
