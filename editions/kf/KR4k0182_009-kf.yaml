body:
  text: 第九回重結鴛鴦雙得意詩曰良才豈許等閒尋遇合姻緣本素襟東閣無賢誰物色西廂有女是知音奇才析賞如珠玉佳句吟成當瑟琴自得美人題品後果然一字值千金卻說劉有美張良卿自送詩後各人心上盡道姻緣有分份十拿九穩只候詩案出來連候數日並不見有消息一日走到學前只見已挂了錄考的告示那些秀才一個個都打點文戰了劉有美看上好不驚財張良卿聞知也像老鼠遇著了貓無處躲避只得又去尋問周榮周榮也只沒法惟有柳友梅曉得了錄科的消息心下暗想道雪公此舉名雖錄科實欲擇婿似我柳友梅這樣一個才貌諒與他令愛的德容也相配合得過只是一件我記得靜如老憎詳夢說我的姻緣個在梅邊定雪邊又況那日湖上相逢乃是兩位佳人今雪公一女安能遂抵二美乎心下雖這樣想但考期已近不得不到杭城隨即稟知母親叫抱琴挑了琴劍書箱主仆二人一徑行過錢塘江複到棲雲庵寓下次日雪太守親臨考校那些秀才哪一個不獻出萬斛珠璣千萬錦繡來取功名然又且雪太守自那詩題一出將擇婿的風聲播傳於外這些少年子弟也有不爲功名反爲著佳人的如柳友梅者正複不少正是金榜名標方得意洞房眷美實縈情十年未識君王面已信蟬娟多悟人誰知雪太守心上名雖錄科也實爲著擇婿這一日坐在堂上出題後便將這些秀才遠遠地一個個賞鑒過然酸的酸腐的腐俱只平平內中惟有一生生得面如滿月唇若塗朱眼凝秋水之神眉萃春山之秀胸藏錦繡風簷下頃刻成文筆落天花瀟灑間立時作賦得言太白識荊州允信歐陽遇蘇軾雪太守看在眼裏心上暗喜道若得此生內外俱美誠佳婿也但不知可就是前日題詩的我且試他一試便提朱筆在題目牌上判下兩個紅字道如有少年名士倚馬奇才不妨親遞詩文本府當面請教實系真儒定行首擢雪太守判了左右傳下那些書生看了不覺又驚又喜驚的是枵腹難醫眼見得必無我份喜的是朱衣暗點僥倖得萬一成名只有柳友梅聽見好像玉殿傳牌報他中狀元的滿心歡喜暗想道雪太守好有心人也這分明要鑒別文才面觀人物選擇東床的意思耳料吾詩句雖佳只是文詞未閱今日乘此機會正好去面呈一番不惟使雪太守知我柳友梅的文才也使他認得我柳友梅的面貌那姻緣事就有根了思算已定柳友梅作性更快不半日便做完了文字柳友梅就親遞到雪太守面前雪太守看見柳友梅一表人才昂然氣宇便起身相接柳友梅行過禮便呈上文字道生員末學菲才幸遇老公祖作養人才特蒙面試斗膽獻醜乞賜垂青雪太守道本府素性愛才既逢佳士敢惜品題況得親見臨文興複不淺說罷便將柳友梅的文字細細翻閱真個是篇篇錦繡字字珠璣萃山川之秀氣玉琢金相奪天地之英華龍姿鳳彩洵是文章成黼黻果然翰墨吐絲綸雪太守看了連聲稱讚道好美才好美才本府遍訪遺賢曾無真士不意近在股肱未能物色深負冰清之鑒矣忙問名字柳友梅忙打一恭道生員姓柳名素心字友梅原籍山陰今進在錢塘學中雪太守道貴庠既系錢塘爲何前日詩篇裏邊不見有賢契名字柳友梅道生員下裏微詞本不敢爭歌白雪但已親送學宮何至浮沈未入玄鑒雪太守爽然自失道可又奇了既如此賢契可將前日所詠原詩今爲寫出待本府查驗便知說罷就取兩幅花箋遞與柳友梅柳友梅接了隨即揮毫將原和的春閨春郊四首逐一寫出呈上雪太守雪太守看了但見寫得龍蛇飛舞字字有神已自不同只是詩句念來卻與張劉二生一字不差雪太守看了心上已曉得柳友梅是個真正才子前日之詩自然是盜襲的了只不說破道賢契佳句本府今帶回領教柳友梅見雪太守贊他文字又要他錄出原詩分明已有心了兩人心照遂各別不題只有劉有美是日聽得柳友梅親遞文字心上已自驚訝又聽說太守要他錄出原詩分明青天裏一個霹靂神魂都嚇散了文字也做不出只得勉強完篇而去張良卿聽說也知馬腳已露心上突突如小鹿撞的一般文字本來不濟那日被此一嚇便只字也沒有只得曳白而回正是假雖終日賣到處有疑猜請看當場者應須做出來且說雪太守回衙見了二小姐便笑說道吾今日爲汝二人得一佳士矣快請你母親與她商議不一時雪夫人已到雪太守道我日前因受了梅道宏之托爲著如玉甥女的事又爲自己瑞雲孩兒的事故把詩題爲由遍訪良才實欲尋覓佳偶以完二女終身不料閱遍杭郡竟無一人前日只有張劉二生的詩句清新俊逸我以爲得此兩賢實爲雙美不道又是盜竊人長二小姐聽說兩下驚疑雪小姐忙問道爹爹他盜竊誰來雪太守道盜竊的是山陰柳友梅的詩雪夫人道可就是相公曾說憶念有日的柳友梅麽雪太守道然也雪夫人道那生果然生得人物何如才學出衆否雪太守道那柳友梅生得面如宋玉才比相如自不必說只是他頃刻成文真個萬言倚馬我已目擊他日雲程定在玉堂金馬功名決不在我之下只不知他可曾授室夫人道若他還未有室便可與他議姻雪太守道只是還有一事要與夫人商議我想此生才貌實爲全美若將此生配了瑞雲恐如玉甥女說我偏心若將此生配了如玉又恐瑞雲女兒說我矯情若要舍此柳生分外再尋一個又萬萬不能有此全美我想昔日娥皇女英同事一舜古聖人已有行之者我見她姊妹二人才貌既仿佛情意又相投我意欲將來同許下柳生未知夫人意下如何雪夫人道既是相公主張料應不差我正慮瑞雲年幼不堪獨主蘋蘩若得甥女作伴彼此相依實爲兩美況且此生才貌兼全更爲難得只是梅姑夫遠任不知他意下畢竟何如你我不好便自專主雪太守道道宏臨別將擇婿一事當面囑託我今日此舉亦爲不負前言只是他尚未知一木雙棲的緣故耳我到明日姑心許之將一字寄到閩中俟道宏回信然後連姻未爲晚也雪夫人道相公所言甚爲有理隨指著二小姐說道只不知她二人心下何如耳雪太守道這也不難我明日還要請那柳生面試新詩我就叫她姊妹二人各出一題若是做來的詩如玉中意便配了如玉瑞雲中意便配了瑞雲若她兩人心上都中意了我便將來同許下柳生這便大家如願矣雪夫人道如此最好如玉小姐與瑞雲小姐在旁聽見各自低頭不語心上都暗喜不題雪太守到了次日隨即差人往錢塘學裏來請柳友梅差人領命走到學前要尋柳友梅卻好撞見周榮的老兒吃了幾杯早酒在那裏走來差人認得是周齋夫便問道老周我問你學裏柳友梅相公的下處在哪里府裏太爺相請哩周榮聽說柳友梅誤認是劉有美順口地答應劉有美麽太爺爲何請他差人道就爲前日詩文太爺中意他今早特特來請周榮笑笑道嘎原來如此這樣我同你去要吃報喜酒賺他報喜錢哩差人道就是便一心認是劉有美一徑同著差人走到劉有美的寓所誰知劉有美只爲做了虛心的事前日錄科時節聞知消息不好仍恐雪太守查驗起來不好意思便連夜出城一道煙走了此時周榮同差人來尋他早已窺其戶闃其無人了差人道既不在此你且同我去回復太爺再來尋請便了周榮道我不去你自去回太爺便了差人道是你本學相公今既不在便同去回復何妨周榮料沒其事只得同來回復差人稟過雪太守忙喚周榮問道柳素心是你本學生員爲何請不到來周榮聽見說柳素心三字心上吃了一驚半晌的不能言語尚記得詩箋上名字有個柳月仙沒有柳素心因支吾道在學的是柳素心送詩的是柳月仙如今老爺要請的是柳友梅因此小人認錯不曾請到雪太守道你且記來柳素心是誰柳月仙是誰如今本府請的柳友梅又是誰周榮道柳月仙想就是柳素心柳素心就是柳友梅雪太守笑笑道蠢奴才既就是他爲何不去請來即著原差同去請到回話卻說周榮只認是劉有美哪曉得太守要請的是柳友梅只得同著差人尋到柳友梅下處差人呈上名帖柳友梅隨即同著二人來到府中雪太守接見柳友梅行禮過雪太守忙問道月仙二字可也是賢契的佳字麽柳友梅道此乃生員偶爾取意何敢蒙公祖太宗師稱問雪太守忙在袖內取出一幅詩箋遞與柳友梅道這詩箋可也是賢契的佳詠麽柳友梅看見方驚訝道此乃友人張良卿所詠爲何冒附賤名雪太守又在袖中取出二幅詩箋遞與柳友梅道這詩句可也是貴同學的佳篇麽柳友梅複接來一看方恍然大悟道這四首詩通是生員的拙詠二首在西湖遊玩同友人劉有美做的二首是月下聞吟同友人張良卿詠的爲何通被他二人竊來若非老公祖冰鑒生員幾爲二生所賣矣便指著周榮說道前日詩箋通交付你送進來的爲何差錯至此反不見我的原詩周榮至此嚇得面如土色魂都不在身上哪里還開得口跪在地上只是磕頭道小人該死小人該死雪太守怒罵道原來是你這該死的奴才作弊更換幾乎誤我大事周榮道小的焉敢更換通是張良卿李君文二人叫我更換的小的不合聽信他小的該死了只是那個劉有美的詩是央及我送一送來不知他怎生更換的一發與小的不相干雪太守大怒叫左右將大板來把周榮打了三十革退學役正是從前作過事沒興一齊來雪太守責罰了周榮方才邀柳友梅到後衙來隨即看坐柳友梅謙遜了一回方才坐下茶罷雪太守便道昨見賢契詩文真個字字珠玉令人不忍釋手今接芝宇不勝慶倖柳友梅道生員學淺才疏蒙老公祖作養俯賜登龍實出望外雪太守道賢契青年椿萱自然並茂但不知貴庚多少曾授室不柳友梅道先京兆已去世七載今只家慈在堂少違庭訓虛度二十未有家室雪太守聽說未曾娶室心上滿懷歡喜便道原來就是柳京兆老先生的令郎失敬失敬今得賢契如此美才柳氏可謂有子矣天之報施自不爽也隨吩咐左右擺酒在嘯雪亭即領雪公子出來也拜見過此時雪公子已有一十多歲了取名繼白表字蓮馨生得面龐與瑞雲小姐一般柳友梅有心便仔細將雪公子一看但見垂髦之貌總角之年姿神娟潔骨格仙妍義欺宋玉秀萃文園亻寧看擲果不讓潘安柳友梅看見心上暗喜道其弟如此其姊可知相見過柳友梅因見了雪公子的儀容一發添了許多思慕愛悅的光景雪太守道前讀佳句清新有懷如渴昨者偶同小兒試拈二題還要求賢契一詠幸勿吝珠玉以慰素懷柳友梅道生員碌碌庸才焉敢班門調斧雪太守道對客揮毫文人樂事況本府有意相求俾得親見構思益遂幽懷矣說罷隨叫左右在裏面傳出二題雪太守隨即接過一看遞與柳友梅柳友梅接來一看原來是兩個詩題一個是尋梅一個是問柳尋梅逢字爲韻問柳緣字爲韻柳友梅暗點點頭道那詩題出得好深情也好慧心也尋梅以逢字爲韻是叫我去尋覓相逢的意思問柳以緣字爲韻是叫我訪問有緣的意思若非那小姐的深情慧心安得到此料想詩人筆伏必無此閨閣幽情也心下才這般想雪太守已叫左右將文房四寶端擺在嘯雪亭就請柳友梅到亭子中來但見亭子內圖書滿壁光生畫錦之堂筆墨盈幾文重洛陽之價茶煙清鶴夢常留奴夜共聆琴花雨釀蜂聲時有南州頻下榻怡情何必名山業能遠塵棼即隱倫柳友梅看見亭子內花香草嫩筆精墨良又一心想著小姐的深情遠韻不覺興致勃勃詩思雲湧提起筆來如龍蛇飛舞風雨驟至不一時滿紙上珠璣錯落正是讀書破萬卷下筆掃千軍漫道謙爲德才高不讓人柳友梅須臾之間即將二詩呈上雪太守見了真個滿心歡暢不覺連聲贊道奇才奇才不惟詩思風雅又捷敏如此幾令老夫亦退避三舍矣敬服敬服看了一遍遂暗暗叫人傳進後衙與二小姐看不一時左右擺上酒來柳友梅慌忙辭謝道生員荷蒙台寵得賜識荊何敢更叨盛款雪太守道便酌聊以敘情勿得過遜柳友梅只得坐下雪太守到上坐了雪公子與柳友梅對面相陪已分明行翁婿的禮了三人歡飲不題且說柳友梅二詩傳進與二小姐看原來是尋梅二字是梅小姐出的問柳二字是雪小姐出的梅小姐就將尋梅的詩展開一看只見上寫道尋梅孤蹤何處問芳容貞靜偏於雅客逢不向東風憐俗士獨乘明月嫁詩翁幽心目斷寒山外遠韻神馳洛水中吟得新篇無限意思君擬欲托賓鴻梅小姐看畢贊道果然好詩深情遠韻托意悠長可謂言有盡而意無窮雪小姐將問柳的詩也細玩一遍只見上寫道問柳凝煙臨水獨嫣然幾向東君訪夙緣待月有情應共玩迎風無意倩誰憐絲綸莫惜枝枝吐黃綠還教葉葉鮮逸韻柔姿憑折取好留佳句動人傳雪小姐看過便也贊道情詞婉轉思致悠揚詩句至此我不能贊一辭矣二小姐各自看畢又交互看了一回兩人心上俱暗喜不題雪夫人見她兩人看詩中意遂暗叫人傳與雪太守知道雪太守與柳友梅談飲了一回酒至中間雪太守道賢契英年又如此才高學博正該宜室宜家爲何尚未授室柳友梅道婚姻乃人生大事生員別有一段隱衷一時在公祖老師之前下敢說出只是終身關係未能輕易許可耳雪太守道本府有一舍甥女即新任福建梅兵備之女本府受舍親之托又見賢契如此美才意欲親執斧柯未敢雲淑女好逑君子亦庶幾才士宜配佳人不識賢契心下例如柳友梅聽說心下暗想我只道他爲著自己女兒的事不道他僅爲甥女的事我想靜如老僧說我的姻緣不在梅邊定雪邊今番驗矣便答道生員一介寒儒雖蒙台命何敢何仰雪太守道愚意已決老夫有一敝年定竹淇泉的侄兒也在山陰當今作媒到尊慈處說合若蒙許允賢契佳吟即作聘禮俟舍甥女奉和原詩以爲回聘之敬賢契慎勿過辭柳友梅心上已自許允只不好便爾應承只得說道既承台命諄諄當回去與家慈商儀奉複二人又飲了一回只見天色將暮柳友梅就告別而回正是衣昔日嬪兩女銅雀當年鎖二喬重結鴛鴦樂何限佇看仙子降河橋畢竟柳友梅與二小姐婚配如何且聽下回分解
