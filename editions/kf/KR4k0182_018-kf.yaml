body:
  text: 第十八回柳友梅衣錦還鄉詩曰富貴還鄉今古榮錦衣花馬坐春風玉樓此日逢雙美金榜當年冠衆雄傾國佳人來月殿千秋才子下蟾宮男兒到此方爲美留得風流佳話中卻說柳友梅與雪公出使北庭流光易過日月如梭不覺已近一年早又臘盡春回梅花吐玉楊柳拖金之日了雪蓮馨告假在家時常打聽北庭的消息要聽得雪公與柳友梅去後的下落卻並無處可通音問心上好生憂悶但有雁字尺遙欲寄魚書水遠又恐惹起母親與二姐姐的憂慮只好挂在心頭不敢放在眉頭一日正值園梅盛開白花如雪融成一片冰心香氣迷空占盡二江春色又見淡黃楊柳好鳥初鳴嫩綠池塘晴光乍轉早又是初春天氣雪蓮馨吩咐家人備酒在後園望花亭請老夫人與兩位小姐一同賞花不一時酒已齊備雪夫人隨同著如玉小姐瑞雲小姐來到後園看梅果然梅花放玉嫩柳搖金暗香隨萬里之風春色奪千花之秀說不盡許多景致雪蓮馨接了母親姐姐一徑到望花亭來雪夫人上坐了如玉小姐與瑞雲小姐從旁雪蓮馨就在瑞雲姐姐肩下坐下四人坐罷丫環們斟上酒來雪夫人道今日我母子四人在此對花賞玩不知你爹爹與姐夫馳驅塞外跋涉風沙何時能夠衣錦還鄉聚首庭闈耳雪蓮馨道母親姐姐且寬懷飲一杯昨日孩兒曾往報房打聽說北人河朔一事和議已成爹爹與姐夫榮歸有日雪夫人喜道得如此感謝天地雪蓮馨便對二小姐道愚弟久困文墨並無好句二姐姐素精音律多有佳吟今日乘此良辰名花在目或詩或賦敢求賜教一篇愚姐自父親去後心中如醉哪里還有興詠詩即使吟來也是淒風苦雨徒益人愁今日花下題詩固是文人韻事然情之戒矣心似搖旌正是無可奈何空叫好花落去因指瑞雲小姐道除非賢妹詩情勝似愚姐瑞雲小姐道三春花柳共嗟薄命之詞五裏風煙同詠斷腸之句每懷靡及無日不思恐當此愁悶無聊時何得言小妹詩情勝似姐姐雪蓮馨道士悲秋色雅女懷春人孰無情誰能堪此但今日梅花在目料可相尋柳色方新不妨試問二姐姐何必太謙如玉小姐道只愁無句尋梅空懷如渴瑞雲小姐道卻又倩誰問柳以遂幽情雪夫人道但今日對此梅花不可一無佳詠曷聯吟一首以記情況何如二小姐道既承慈命當勉續貂隨叫丫環取過文房四寶即於花下聯吟一首雪夫人隨展花箋提筆寫上自將心事與梅花寫畢遞與如玉小姐如玉小姐接來一看隨舉筆題下無語憑花祗自差題罷傳與瑞雲小姐瑞雲小姐接來看了也就提筆寫上幾欲向花通一語寫完就遞與雪蓮馨雪蓮馨一看說道好詩好詩字字有意句句含情便提起筆來續成末句寫道不知花意落誰家母子四人這一個構思白雪那一個煉句陽春滿席上墨花亂墜筆態橫飛正在對花吟詠之際只見丫環從外邊傳進一本報來雪蓮馨道這兩日沒有報送我正要看來揭開一看只見一本敘功事原任杭州知府今加兵部侍郎雪霽同新科探花今入翰林學士柳素心奉使邊庭講議和好不辱君命還朝有功著實授原職又雪霽告病懇切准著馳驛還鄉調理痊可不時召用又翰林院柳素心告假省親准告俟經筵舉行進京召用又一本敘功事總兵竹鳳阿鎮守有功加升江南提督又一本封贈事故福建兵備梅顥忠勤爲國加封太子太保欽賜禦祭一筵又一本釋放宮女事掖庭女寵請如唐太宗天寶年間悉行釋放俱奉聖旨是雪蓮馨看畢便細細與夫人小姐說知舉家歡喜一霎時把這些舊恨新愁盡盡爲春風和氣了正是否極泰方至離多合始來天機原自爾人事豈能違卻說雪公與柳友梅出使邊庭因議河朔一事和議不能就成往來返複直到一年方得議成翁婿二人還朝面君就急急告假還鄉聖旨依奏奉旨馳驛還鄉雪公實受了兵部侍郎的職柳友梅實受了翰林院學士的職一路上百官迎接人夫轎馬冠蓋僕從好不興頭不一月余便到了蘇州雪蓮馨接了備酒接風柳友梅因又在雪公處盤桓了數日方回山陰省親楊夫人見兒子歸來不勝歡喜柳友梅見過母親便把到京登第及出使邊庭的事細細說與母親得知楊氏夫人道我只道你在京聽選原來吾兒已成此段功名可無愧你父親的家聲並你母守節的志氣矣但抱琴歸來爲何並不提起柳友梅道是孩兒恐驚壞了母親吩咐他如此說的楊氏夫人道原來如此但你今日已金榜名標正該洞房花燭早結梅雪姻緣成就百年鸞鳳柳友梅道孩兒心上也只有這一段姻緣未完耳只是前日是竹風阿爲媒他今已升了江南提督正好爲我作媒但尚未到任還要待他幾日楊氏夫人道這也不妨待他幾日但自你出門後又有一李半仙到我家來他說曾受你大恩你又曾許娶他的女兒可有此事麽他已到京訪你我因你久無音信也就托他訪個消息你曾遇見他麽柳友梅道李半仙不曾遇見這姻事同是有的便將昔日還金贖身之事一一說了一遍楊氏夫人道既如此你也該踐卻前盟柳友梅道正是我也要去訪他才說罷只見長班進來道稟老爺外面有一相士求見柳友梅道請他進來柳友侮出來迎接卻原來就是李半仙二人一見如故李半仙道老大人德行如山今果風雲萬里學生荷蒙大恩未報萬一曷勝惶恐柳友梅道辱承厚誼千里相尋才與家慈談及今幸遙臨曷勝忻幸李半仙便把雪夫人昔日寄的家書遞還柳友梅道這是令岳雪老爺的家書前日到京不曾面致今仍送還老大人柳友梅收好便道既如此姑蘇家岳處必曾相認過李半仙道到過幾次柳友梅道正好與學生作媒明日行聘就煩尊駕走遭李半仙道當得效勞柳友梅道令愛姻事俟梅雪二處行聘後便好相求李半仙道小女蓬蓽陋姿改日當送到府中永執箕帚耳二人說罷柳友梅就留李半仙住下當晚不題到次日劉有美與張良卿在家聞知柳友梅做了翰林學士衣錦還鄉好不榮耀老著臉只得也來拜望把昔日奉承嚴府的面孔撮轉來又奉承柳友梅了柳友梅是個大量的倒把從前醜態一概相忘原以舊交優待答拜後就叫家人發兩個名帖一個去請張良卿相公一個去請劉有美相公就叫李半仙擇了一個行聘吉日治酒就央李半仙做主媒請劉有美與梅小姐爲媒張良卿與雪小姐爲媒備了兩副盛禮一時同送到蘇州雪公家來雪公受了治酒管待衆人彼此歡喜無盡但雪公這日只不發回聘的禮衆人道卻是爲何李半仙便問道老大人回聘的禮可乘吉日發去爲何只是不發雪公道有個緣故老夫有一義女名喚朝霞老夫出使時節爲朝廷點宮妃一事親代小女點進宮中老夫感其義俠不忍忘本意欲與柳賢婿同上一疏救她出宮三女同歸庶幾恩盡義至今聞皇上洪恩釋放宮女前已著人到京領歸俟其歸來祈賢婿可再用一副聘禮送到老夫處老夫便將三副回聘的禮一起發回乞將此意轉致柳賢婿李半仙道足見老大人仁盡義全令人欽仰張劉二生聽了方曉得前日點進宮的也還不是雪小姐自悔從前之失李半仙與衆人隨別了雪公回去回復了柳友梅柳友梅道原來又有這一段緣由隨即另擇一日仍備一副盛禮送到雪公家來恰好朝霞已從京中領回雪公受了隨發了回聘的禮又治酒款待了衆人回去柳友梅過了幾日又擇了一個大吉之期要行親迎之禮柳友梅是年已二十多歲一個簇新探花欽授翰林學士人物風流才貌出衆人人羡慕到姑蘇來娶親柳友梅備著三隻大船三頂花轎禦賜紅燈夾道宮花鼓樂滿湖舟至閭門柳友梅騎著高頭駿馬烏紗帽皂朝靴大紅員領翰林院執事兩邊排列柳友梅親自到桃花塢中親迎一路上火炮喧天好不興頭熱鬧梅雪二小姐與朝霞金裝玉裹打扮得如天仙帝妃一般拜辭了雪公夫人灑淚上轎雪公排了兵部侍郎的執事雪蓮馨也排了翰林院的執事俱穿了吉服送親楊連城聞知也排著推官執事來送親恰好柳友梅成親這日竹鳳阿升了江南提督已到了任這一日穿了大紅吉服黃羅傘蓋了耀日盔排了提督府的執事也來送親李半仙與張良卿劉有美三人都是吉服駿馬簪花挂紅兩頭贊禮直到胥門下船歸去好不榮耀到了山陰山陰知縣也來迎接一路上了轎到了柳探花府門首下轎擁入中堂柳友梅居中三位新人左右分立參拜天地家廟禮畢迎入洞房外面倒是李半仙陪著衆人飲酒房裏是四席酒柳友梅與二小姐朝霞同飲花燭之下柳友梅偷眼將二小姐一看真個有沈魚落雁之容閉月羞花之貌宛然湖上相逢的美人又將朝霞一看分明就是那日揭簾時的侍女滿心快暢此時侍妾林立不便交言將無限歡喜通忍在肚中只等衆人散去然後同歸洞房原來柳友梅後邊新造的廳摟四間左右相對左邊是梅小姐右邊是雪小姐左邊下面一間就做了朝霞的房右邊下面一間後日便好做春花的房柳友梅與二小姐朝霞同在洞房訴說從前相慕之心並湖上相逢舟中題句及詠尋梅問柳一詩的事尚疑似合歡亭夢裏巫山棲雲庵夜來神女這一夜親身雲雨之樂比昔日夢中梅雪之緣更自不同真是少年才子佳人你貪我愛好不受用正是瀟灑佳人風流才子天然吩咐成雙蘭堂綺席燭影耀輝煌看紅羅繡帳寶妝篆金鴨焚香分明是芙蓉浪裏對對浴鴛鴦歡娛當此際山盟海誓地久天長願五男二女七子成行男作公卿宰相女須嫁君宰侯王從茲去榮華富貴福祿壽無疆右調滿庭芳到了次日柳友梅隨請衆人飲宴了兩日第三日晚又備酒在後堂請老夫人見過禮排下五桌酒柳老夫人上坐了一桌柳友梅如玉小姐瑞雲小姐與朝霞各人依次各坐了一桌二小姐取出向日柳友梅所詠的春閨春郊四詩及尋梅問柳二首同看了一遍柳友梅也取出昔日二小姐和成的尋梅問柳二詩也同看了一遍大家展玩一番母子姑媳同飲閤家歡方各各歸房從此至相敬愛百分和美柳友侮因念李春花昔日之盟隨與二小姐說明也到李半仙家娶來做了第四位夫人過了幾時柳友梅隨同四位夫人上了祖墓拜過了父親柳繼毅的墳又到棲雲庵把銀一千兩送與靜如和尚酬他昔日之情靜如就與柳友梅建造了一座關帝閣了完舊願不隔幾時朝廷舉經筵欽召柳友梅進京友梅就同二小姐到雪公家歸寧了然後同著梅如玉小姐順便往金陵拜了岳父梅道宏的墓恰好正值禦祭柳友梅又與梅公重建造了墳墓料理了些家事然後進京住不上一二月因記挂四位夫人就討差回來柳友梅只願與四位夫人吟詩做文不願做官後一科就分房後一科南京主試收了許多門生後直到詹事府正詹因他無意做官因此不曾拜相雪公後日也不願做官遂挂冠林下因慕山陰禹穴的勝景也就移居到柳友梅處來雪蓮馨又與楊連城的妹子結爲婚姻親上加親一發契誼後來梅小姐生了兩個兒子雪小姐生了一個兒子朝霞也生了一兒一女李春花也生了一女一子真是五男二女因梅公無嗣柳友梅即將如玉小姐次子承繼梅公之後又與竹鳳阿結爲姻眷後五子俱登科第夫婦五人受享人間三四十年風流之福豈非千古佳話
