body:
  text: 第七回假張良暗計圖連理詩曰閑將青史悶難禁古古今今事業深謀似子房懷隱恨智如諸葛淚餘襟月當圓處還須缺花若禾農時便被侵可笑愚癡終不悟幾番機變幾番心卻說張良卿因一時酒後興高便沒心把雪小姐的心事都對柳友梅說了後見柳友梅再三留意又見詩句清新到第二日起來倒想轉來心下倒有幾分不快因走列亭子中來只見李君文蓬著頭背剪著手走來走去像有心事的張良卿見了道老李你想什麽李君文也不答應張良卿走到面前李君文惱著臉道我兩個是聰明人平日間自道能賽張良勝諸葛今日爲何做這樣糊塗事起來張良卿道卻是爲何李君文道昨夜那姓柳的又非親又非故不過是一時乍會爲何把真心話通過他說了況他年又少人物又生得風流逸秀詩又做得好他曉得這個消息卻不是鴻門宴上放走了沛公我們轉要與他取天下了好不煩難麽張良卿道小弟正在這裏懊悔來與你商議如今卻怎生區處李君文道說已說了沒什計較挽回張良卿道昨夜我也醉了不知他的詩畢竟與我如何拿來再細看看李君文遂在書架上取下來二人同看了一回面面相覷張良卿道這詩反復看來倒像是比我的好些我與你莫若竊了他一家一首送到府裏去燥脾一燥脾風光一風光有何不可小柳來尋時只回他不在便了李君文道小弟昨夜要他做第二首便已有心了今仔細思量還有幾分不妥張良卿道有什麽不妥李君文道我看那柳月仙小小年紀也像個色中餓鬼他既曉得這個消息難道倒罷了不成況他又是錢塘學裏他若自寫了去一對出來我們轉是抄舊卷了那時便有許多不妙張良卿道兄所言亦是卻又有一計在此何不去央央學裏的周齋夫叫他收詩的時節但有柳月仙的名字便藏匿過了不要與他傳進難道怕他飛了進去不成李君文道此計甚妙但只是詩不傳進萬一府裏要他到學裏查起來這事反爲不美就是柳月仙見裏面不回絕他終不心死倒不如轉同他去做個明修棧道暗度陳倉的計罷張良卿道怎麽一個明修暗度李君文道只消將這兩首詩通來寫了自家的名字卻把兄昨日做的轉寫了柳月仙的名字先暗暗送與周齋夫與他約通了然後約同了柳月仙當面各自寫了一同送去那周齋夫自然一概收詩這叫做明修棧道了卻暗暗挽周齋夫換了送去那小姐若看見了你的詩好自然把柳月仙遺棄了那時他自掃興而去兄便穩取荊州了這不是暗度陳倉麽張良卿聽了滿心歡喜道好算計好算計求要求韓信拜要拜張良畢竟兄有主意只是要速速爲之周齋夫那裏卻叫哪個好去李君文道這個機密事如何叫得別人須是小弟自去只是老周是個利徒須要破些鈔方得事妥張良卿道成大事者不惜小費這個如何論得稱二兩頭與他許他事成再謝李君文道二兩也不少了張良卿只得袖了二兩銀子用封筒封了就將柳友梅二首詩用上好花箋細細寫了落了自家的名字轉將自家的詩叫李君文寫了作柳友梅的卻不曉得柳友梅的名字只寫著柳月仙題寫完了李君文並銀子同在袖中一徑到錢塘學裏來尋周齋夫正是損人偏有千般巧利己仍多百樣奸誰識老天張主定千奸百巧總徒然原來這周齋夫姓周名榮乃是錢塘學裏的一個老值路綽號叫做周酒鬼爲人喜殺的是白物耽殺的是黃湯但見了銀子連性命也不顧倘拿著酒杯便頭也割下來凡有事央他只消一壺酒一個紙包隨你轉遞文字賣囑秀才這些險事也都替你去做了這日李君文來尋他恰好遇他在學門前背著身子數銅子叫小的去買酒李君文到背後輕輕地將扇子在他肩上一敲道老周好興頭周榮回轉頭來看見李君文笑道原來是李相公李相公下顧自然興頭了李君文道要興頭也在你老周身上周榮聽見口中是上門生意便打發了小的隨同李君文走到轉灣巷裏一個小庵來坐下因問道李相公有何見諭李君文道就是前日詩題一事要你用情一二周榮道這不打緊只要做了詩我與李相公送到府裏去就是了李君文道詩已在此只是有些委曲要你用情與我周旋周榮道有什委曲只要在下做得來的再無不周旋李君文就在袖子裏摸出那兩幅花箋道這便是做的兩首詩一首是敝相知張兄的一個是個柳朋友的通是本學老周你通收在袖裏過一會兒待他二人親送詩來煩老周將他的原詩藏起只將此二詩送與府裏這便是你用情處了周榮笑道這等說來想是個掉綿包的意思了既是李相公吩咐了又通是本學的相公怎好推辭作難只憑李相公罷了李君文來時在路上已將二兩頭稱出一兩隨將一兩頭遞與周榮道這是張相公一個小東你可收下所說之事只要你知我知做得乾淨相倘後有幾分僥倖還有一大塊在後面哩周榮接著包兒便立身來說道既承相公盛情我即同李相公到前面酒摟上領了他的情何如李君文道這倒不消了張敝友在家候信還要同來耽擱不得了容改日待我再請你罷周榮道既是今日就要幹正經連我酒也不吃了莫要飲酒恨他的事李君文道如此更感雅愛遂別了周榮忙忙來回復張良卿此時張良卿已等得不耐煩看見李君文來了便即著問道曾見那人麽李君文道剛剛湊巧一到就撞見已與他說通了怎麽小柳還不見來正說不了只見柳友梅從園門邊走進來原來柳友梅只因昨夜思量過度夢魂顛倒起來遲了又因與靜如和尚細談一朝梳洗畢吃了飯到張家園來已是日午了三人相見過張良卿道月仙兄爲何此時才來柳友梅道因昨夜承二兄厚愛多飲了幾杯因此來遲得罪李君文笑道想是不要看雪小姐的新詩了小弟今早倒已覓得在此柳友梅道原來兄不失信既如此乞賜一觀李君文道看便看只是我三人的詩也要送去了今早學裏來催今晚可同送去罷柳友梅道承二兄見挈更感雅愛李君文就在拜篋中取出一幅花箋遞與柳友梅道這便是雪小姐的詩了柳友梅接來一看只見上寫一首七言律詩石徑煙染綠蔭涼柳拖簾影透疏香去時燕子憐王謝今日桃花賺阮郎半枕夢魂迷蚨蝶一春幽恨避鴛鴦雨絲飄處東風軟依舊青山送夕陽原來這首詩乃是杭州一個名妓做的李君文因許了柳友梅的詩只得將來唐塞他柳友梅看了笑道詩句甚好只是情竇大開不像個千金小姐的聲口此詩恐有假處李君文道這詩的真雪小姐的爲何假起來柳友梅將詩細看只是不信張良卿道月仙兄看出神了且去幹正經要緊這時候也該去了不要說閒話誤了正事李君文道小弟詩未做完沒份只要二兄快快寫了同送去張良卿與柳友梅各寫了自己的詩籠在袖中二人一同出園門竟到錢塘學裏來正是遊蜂繞樹非無意螻蟻拖花亦有心攘攘紛紛戀春色不知春色許人侵卻說柳友梅同著張良卿一同到學裏來恰好才到學前撞見了劉有美忙問道我哪里不尋兄來前日西湖上別後兄寓在哪里小弟那日就返舍令堂便著抱琴來問了幾次這幾日不歸懸望得緊哩柳友梅道小弟也就要返舍隨指著張李二兄道只因遇著張李二兄因此逗留這兩日劉有美道原來如此忙與張李二生作了揖敘了些文柳友梅問道劉兄今日何往劉有美道難道兄倒忘了就是爲詩題一事了但不知兄又何往柳友梅笑道小弟也爲送詩而去劉有美暗點點頭道那兩位莫非也是麽柳友梅道然也劉有美聽了就忙忙地作別道小弟有事去了兄若送了詩去千萬速回柳友梅道多感多感劉有美去後友梅就同張李二生來尋周榮各自付詩與他卻說周榮見三人來心下已自暗會假作不知道三位相公既然各有詩了只留在學裏待在下送去就是三人齊道如此有勞你明日詩案出了請你吃喜酒罷周榮道使得使得三人別了周榮回去柳友梅只得又在棲雲庵住了一宿到次早抱琴也尋來接了就一同歸去不題且說劉有美遇見了柳友梅爲何如此著忙他原來這日湖上已有心盜襲柳友梅的詩句到次日便訪知梅雪二小姐的下落便把暗記柳友梅的二首寫好落了自家名字封好連忙趕到抗城送詩到錢塘學裏來也去央及了周榮不期路上撞見了柳友梅耽擱了半日又聽他們說來他們三人也爲送詩仍恐打破了自家的網因此又叮囑柳友梅作速回家自己急急忙忙地別去正是天定一緣一會人多百計千方縱使人謀用盡哪知天意尤長畢竟送詩以後二小姐去取何如月聽下回分解
