body:
  text: 第三回兩閨英湖上遇才郎詩曰千秋慧眼落閨英偏識風流才子心范蠡功成逢浣女相如時到度琴音明珠豈混塵沙棄白璧從無韞鯶沈一見莫言輕易別秋彼臨去最情深卻說是日遊湖心的官船就是杭州府雪太守夫人與福建梅兵備的小姐接風那雪太守與梅兵備另設席在昭慶寺賞梅夫人與小姐就排酒在船雪太守與梅兵備原系姑表至親因往福建上任從杭州經過雪太守因此留住雪太守是蘇郡人名霧字景川夫人王氏只生得一子一女一子尚幼女兒年方二八因她母親夢見祥雲繞屋而生名喚瑞雲生得姿容絕世敏慧異常觀其色真個落雁沈魚果然羞花閉月論其才不惟女紅之事色色過人即詩賦之間般般精妙就是雪太守的詩文卻也常常是她代筆曾有一詩贊那雪小姐的好處桃輸綽約柳輸輕玉貌花容誰與衡向月乍疑仙女降淩波欲擬洛川行弱教看去魂應死秀許餐時饑不生最是依依臨別際眼傳秋水更多情梅兵道是金陵人名灝字道宏年已五十只生得個女兒臨生這日梅公夢一神人賜他美玉一塊雪白無瑕因取名喚做如玉這如玉小姐生得姿容比瑞雲小姐一般真個眉如春柳眼似秋波更兼性情聰慧八九歲時便學得描鸞刺繡件件過人不幸母親雪氏先亡過了每日間但與梅公讀書說字乃山川秀氣所鍾天地陰陽不異有百分姿色便有百分聰明十四五歲時便也知詩能文竟成個女學士曾有一詩贊那梅小姐之好處雲想嬌容花想香悠然遠韻在新妝輕含柳態神偏媚淡掃蛾眉額也光詩思只宜雪作侶玉容應倩月爲裳風流多少情多少未向人前已斷腸凡家居無事的時節往往梅公做了叫如玉和韻如玉做了叫梅公推敲就是前日雪太守出的詩題也是他父女唱和之作在金陵時梅公寄與雪太守要他和韻雪太守因杭州是人文淵藪故就把此題仰學試士一則觀賞人文一則便爲擇婿基地因此劉有美得此消息恰好是日遊湖柳友梅的船與官船相近也是天緣有分無意中劉有美把柳友梅的詩句高聲朗吟順風兒吹列二小姐船中來二小姐耳聰聽見了梅小姐想道這詩首尾是我父親限的韻爲何這裏也有人吟詠起來又和得清新俊逸似不食煙人者雪小姐也道那詩果然字字風流句句飄逸令人有況李青蓮之想二小姐一頭說一頭把柳友梅的詩句一句一句的都暗記在心上了梅小姐忙叫侍兒朝霞道你看湖內誰人吟詠那侍兒乖巧輕輕地從旁邊揭起垂簾讓二小姐從斜側裏窺看自己卻露出頭來恰好遇著柳友梅在那裏指點湖山笑談風月侍兒早又識貨骨碌碌兩隻眼睛倒把柳友梅看個盡情把柳友梅的豐神韻度都看出來不知柳友梅的神魂早已被簾內美人攝去了因這一見有分教佳人閨閣有懷吉士風流才子文園想殺多嬌韻態正是清如活水分難斷心似靈犀隔也通春色戀人隨處好男貪女慕兩相同那侍兒看在眼中藏在肚裏也不便就對二小姐說直至船已離湖瞞著雪夫人到後艙來私與二小姐輕輕地說道方才吟詩的船就在吾船對面他船內也有三四個少年只是村的村俏的俏只有那身穿水墨色衣頭戴一片氈巾的生得風流韻致自然是個才子梅小姐道哪見得就是才子雪小姐忙問道那詩可就是他吟詠的麽朝霞笑道朝霞見他人物是風流的那詩句是他吟詠不是他吟詠叫朝霞一時哪辨得出據朝霞看來一定是那人做的別人也做不出梅小姐道世間難得全美有才未必有貌有貌未必有才哪見得就是他吟詠的雪小姐道有才必須有貌有貌必竟有才朝霞說來亦未可知朝霞道還是小姐說得好我家小姐太心疑了雪小姐道奴也聞前日爹爹說姑夫處寄來詩題一時無暇未便和韻我已發到各學去了看這些秀才做來莫非此生已知此題故乘著春光賦就的麽若果就是地真可謂風流才子矣如玉小姐道原來如此若果是他古稱潘安貌子建才殆蒹之矣朝霞笑道我想越中今日有兩位佳人只怕沒有兩個才子來相配對雪小姐道越中人文淵藪你哪里曉得就沒有麽梅小姐道有或有之只恐當面錯過耳雪小姐道既已當面焉忍錯過朝霞冷笑一聲忙問道敢問二小姐不錯時卻如何雪小姐才要說卻好船已到錢塘門梅兵道的大坐船已近如玉小姐與雪夫人瑞雲小姐作別回船雪太守處早有人役伺候就上岸登轎進城而去正是數載親情才見面一朝分手便相離怎知天意由來合雪與梅花仍舊依畢竟二小姐別後何如且聽下回分解
