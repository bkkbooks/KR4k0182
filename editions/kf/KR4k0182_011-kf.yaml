body:
  text: 第十一回古寺還金逢妙麗詩曰由來方寸可耕耘拒色還金憶古人仗義自能輕施與鍾情原不在身親百年永遂風流美一夜相逢性命真不是才多兼德至花枝已泄幾分春卻說柳友梅自遇了梅雪二小姐的姻緣心上巴不能個早登了雲梯月殿成就了風友鸞交哪曉得半中間梅公一變如玉小姐扶柩回金陵翌日與雪太守話別後別了竹鳳阿自己同抱琴一徑到學院前尋個下處歇了心上好生憂悶暗想道我只道佳人已遇只要功名到手遂了吾母之志應驗了金榜題名然後洞房花燭的兩語誰料半中間忽起了這段風波如今功名未蔔何如玉人又東西飄泊不知尋梅問柳的姻緣又在何日相逢矣心下這般想便沒心緒起來倒把爲功名的心灰冷了一半沒奈何只得叫抱琴跟了出外閑步行了三四裏忽到一座古寺進得寺門門前一尊伽藍就是大漢關帝像柳友梅拜了兩拜想到前在棲雲庵曾把姻緣問過神聖許我重結鴛鴦的簽訣今果有驗但日下姻緣尚在未定之天何不再問一問想了一想仍舊禱告了就將籤筒搖了幾搖不一時求上一簽只見依舊是棲雲庵的簽決柳友梅看畢想道若如此簽便不患玉人飄泊矣拜謝過便走進寺中但見古樹蘢蔥禪房寂靜鳥鳴隔葉花落空苔並無一人遂步到正殿上來只見佛座側邊失落一個白布搭包抱琴走上拾起一看內中沈沈有物抱琴連忙拿與柳友梅打開一看卻是四大封銀子約有百余金柳友梅看畢便照舊包好叫抱琴束在腰間心下想一想對抱琴道此銀必是過往人偶然遺亡或匆忙失落的論起理我該在此候他來尋交付與他方是丈夫行事只是我考期在即哪里有功夫在此守候卻如何區處莫若交與寺僧待他還罷抱琴道相公差了如今世上哪有好人我們去了偏寺僧不還哪裏對去卻不辜負了相公一段好意既要行此陰騭事還是等他一等爲妙柳友梅道你也說得是只得沒法兩人在寺中盤桓了一回又往寺外來探望了半日只見日色已西並無人來柳友梅見天已漸暮心上好生不耐煩直到抵暮只見一個老婦踉蹌而來情甚急遽忙進寺門到正殿上去柳友梅就隨後進來看她但見在佛殿上佛座前四下一望便頓足道如此怎了如此怎了佛天佛天料我性命也活個成了不免鳴鳴咽咽哭將起來柳友梅見老婦如此忙上前問道老媽媽你爲著什來如此情急老婦道相公聽稟老身因拙夫爲盜相扳現今系獄冤審贓銀一百二十兩要納銀贖罪昨日沒奈何只得把一小女賣與一位客人爲妾得過價銀一百兩那客人也憐我夫主無辜受禍分外身價之外助銀二十兩尚少三十今早才去領銀回家不道路上遇了公差老身被他逼慌只得隱避過了到此寺中把銀放在佛座下避過公差老身忙出寺門竟忘取了銀子到家想著急急尋來已自下見一定已落他人眼見我一家性命都活不成了老婦一邊說一邊下淚說罷又大哭起來柳友梅道原來如此你不須啼哭幸喜銀子我拾得在此我已等你一日了只問你銀子是幾封何物或貯的老婦道銀子是四封外面是白布搭包柳友梅道不差就叫抱琴在腰間解出交與老婦道如今收好了婦人見有了原銀喜出望外便拜倒地下道難得相公這樣好人只是叫老身何以補報求相公到捨下去叫我小兒小女一家拜謝相公柳友梅道天色已暮我就要歸寓了老婦道相公尊寓卻在何所柳友梅道在學院前老婦道老身家裏也就在學院東首一帶槐柳底下相公正好到寒舍作寓待老身補報萬一柳友梅因天色已夜就一徑歸去老婦就隨後追來抱琴也跟著不一時已到院東一帶槐柳樹下就是老婦的門首了老婦死也要留柳友梅進去柳友梅望見自己寓所已近在西首只得進去一遭老婦迎進去了柳友梅坐在中間一個小小草堂裏面但聽得內邊嗚嗚咽咽像個女子哭聲甚是悽楚悲涼正是如怨如慕如泣如訴情悲欲絕處定然薄命之紅顔腸斷幾回時疑是孤舟之嫠婦餘音聽到淒其處事不關心也覺愁柳友梅聽到傷心不覺自己也墮下淚來轉沈吟不動身了抱琴走進道夜已黃昏相公好回寓了柳友梅才要起身只見老婦已點出燈來隨後便領出十余歲的孩子年方二八的一個女兒就叫女兒你且拭幹了淚眼拜了大恩人柳友梅連忙走開那孩子與女子是撲地四拜柳友梅一眼看看那女子只見那女子生得如花似玉美豔異常但覺纖腰嫋娜皎如玉樹風前粉面光華宛似素梨月下淚痕餘濕處乍疑微雨潤花容眉黛鎖愁時還擬淡煙凝柳葉捧心西子渾如許遠嫁昭君近也非柳友梅看了不覺魂消了半晌便問道媽媽方才的令愛就是日間所言的麽老婦人含著淚道正是只因她心上不願嫁那客人爲此在裏面啼哭柳友梅道果然可惜了你女兒老婦道也是出於無奈老夫婦只生得一子一女實實是捨不得的柳友梅道這個自然只是今晚我要回寓明日你可到我寓中我有話與你說說罷柳友梅就要回去老婦苦留不住只得放柳友梅回寓了柳友梅獨在寓中心下想道我只道美貌佳人天下必少不料今日還金之後又遇著如此一個傾國傾城的女子只可惜紅顔薄命就要遺落外鄉我何計以救之約算囊資尚有百金只不能足三五之數想了一想道有了不免寫一字到竹鳳阿處暫借應用救人患難也說不得了次早便寫書叫抱琴到竹鳳阿家裏去了自己把囊資約算足有百金便准等老婦來老婦因感柳友梅的恩德次早也就來拜謝柳友梅道此何必謝只是你女兒既已與人若還原銀可還贖得麽老婦道那客人也憐我夫婦無辜受累這百金明是多出的我女兒能值許多若還原銀自然肯的只是還銀夫便死留銀女又亡也是沒奈何耳言至此那老婦又撲簌簌落下淚來柳友梅道你不必悲傷我已停當一百兩銀在此你可將原銀送還那客人倘後日少銀通在我身上是了老婦道難得相公這樣好心真是重生父母只是叫老身怎生受得柳友梅道銀錢事小救命事大人在顛沛患難中我若不救誰可救來老婦道只是何以圖報相公柳友梅道既要救人安敢望報老婦沒奈何只得拿了柳友梅的銀子辭謝了別去就將原銀送還了客人將柳友梅的銀子先納完官然後來到獄中見了丈夫李半仙將柳友梅還銀贖身的事細細與丈夫說了一遍李半仙道世上有這樣好人是我再生父母了只是受人大恩何以報答可就把我女送他只不知可曾娶室若是娶過便做個侍妾也罷他行了這般陰德還有極大的造化在後面哩李老婦道我心上也是如此那獄中人聽見說了也道不要說你一個女兒這樣人便是十個女兒也該送他李老婦遂別了丈夫歸來家裏就治些酒肴傍晚就來請柳友梅道受相公這樣大恩真起死肉骨今晚聊備一杯水酒以盡窮人之心柳友梅道綏急時有患難相扶何必勞媽媽費心況我場事在即料沒功夫領情老婦道請相公吃酒相公自不屑但有事相求必要相公到寒舍走遭柳友梅道若是少銀子明日就有我已著人回去取來老婦道不是銀子另有事回家柳友梅道有事就此說明何必更往老婦道一定要相公去柳友梅被逼不過只得去走遭隨閉上寓房一徑同到李老婦家來老婦領著柳友梅直到內房中只見幾案上齊齊整整已排列許多酒房屋雖小卻也精潔幽雅盡可娛目中間挂一幅名畫焚一爐好香側裏設一張竹榻挂一條梅花紙帳庭子內栽著些野草閑花柳友梅坐下暗想道好一個潔淨所在倒可讀書不多時李老婦拿出一壺酒道柳相公請上坐待老身把酒奉敬以謝大恩柳友梅道這不敢當我還不曾問得媽媽你夫主姓什名誰近托何業如何爲人扳害李老婦道拙夫姓李號半仙風鑒爲業只因在人叢裏相出一大盜爲他扳害以致身家連累性命不保柳友梅道原來如此真是無辜受罪了李老婦道老身倒不曾請問相公尊居何處尊姓尊號曾娶過夫人否柳友梅道小生姓柳字友梅家世山陰已定過杭州雪太爺的小姐李老婦道我說相公一定是個貴人老身受柳相公大恩苦無以報就是昨日相公看見過的小女名喚春花長成一十六歲了情願與柳相公納爲婢妾永執巾帚以盡犬馬之報柳友梅道言重言重小生斷無此心李老婦道柳相公雖無此心老身實有此意相公的大德我已與拙夫說知實出自拙夫的意思說罷便喚女兒出來原來這李春花生得姿容妖豔美麗異常又且性格溫柔頗嫻詩句兼善麻衣相法那日見了柳友梅便曉得他是個貴人好生顧盼留意只恨身已屬人誰知柳友梅又有意救她爲此這晚也情願出來執壺把盞如執婢女之禮柳友梅看見便驚訝道豈有此理我去了即忙起身就要出來哪曉得門已閉上母女二人苦勸留住柳友梅無可奈何只得勉強坐了心下暗想道這分明要活活捉弄我了我今晚還是做個魯男子還是做個柳下惠學柳下惠不可還是學魯男子罷思量了又要起身春花女又扯住了不放又轉念道料今夜學魯男子也是我學柳下惠也是我只要定了主意心下這般想只見春花女斟著一杯酒伸出筍尖樣雪白一般的玉手雙手捧來遞與柳友梅柳友梅至此但見燈光之下有女如花也不覺心醉魂消不好意思只得接著酒飲了春花女又執壺斟起一杯柳友梅心下想道酒乃色之媒酒能亂性不可吃了便推辭道小生量淺吃不得了春花女又百般地勸誘柳友梅只是不飲老婦見柳友梅堅拒不飲只得說道柳相公不用酒想要睡了就請內房去睡罷柳友梅道睡倒不消只求一壺茶坐一坐天明就要去老婦又去泡一壺好茶燒一爐好香叫女兒陪了柳友梅自己同兒子去睡了柳友梅坐便坐下怎當她一個如花似玉的佳人坐在面前那心猿意馬哪里捉縛得定只得尋一本書來觀看就在書桌上抽出一本來恰好乃是一本感應篇展開一看看到後面只見載的陸公容拒色故事有詩一首雲風清月白夜窗虛有女來窺笑讀書欲把琴心通一語十年前已薄相如柳友梅看了歎道好個十年前已薄相如古人此語若先爲我柳素心今夜說了想起來這事我柳素心斷不可行春花女道賤妾聞魯南子拒門不納是不可行也柳下惠坐懷不亂是或可行也柳相公何必太執柳友梅道豈不聞以魯男子之不可方可學柳下惠之可我柳素心是學魯男子不是學柳下惠的這事斷乎不可行春花女見話不投機只得又捧了一盞茶自吃了半盞剩卻半盞又親手的奉與柳友梅柳友梅見春花女嬌羞滿眼紅暈生頰至此又舌吐丁香唇分絳玉雙手奉過茶來愈覺欲火難禁色情莫遏忽又轉一念道我柳素心若行此事便前功盡棄矣接了茶便順手地潑在地下但見月色當窗花影如畫推開一看如同白晝春花女道月色皎矣佼人僚矣正妾與相公今夕之謂也柳友梅道豈不知有女如雲雖則如雲匪我思存春花女聽了蹙著眉半晌無語不免垂下淚來道如此說來柳相公必棄捐賤妾矣妾雖自獻實以相公才德容貌不是常人願以終身永托故中情孔切至於如此此文君所以越禮於相如紅拂所以私奔于李靖也今柳相公如此使妾何處容身早知今日反成累悔不當初莫用心柳友梅聽到此處轉不覺情動於中對著李春花道小娘子不是這般說這事于我輩讀書人前程最有關礙小娘子既系慧心之女小生也非薄情之士終身之計俟令尊出獄明行婚娶就是了春花女道只恐柳相公既已好逑淑女焉肯下顧小星今日倘爾不納異日安肯相容柳友梅道小娘子不要錯認小生小生曾于西湖上題詩遂成姻眷嘯雪亭詠句實結良緣便將梅雪二小姐的親事一一說了道小生原系鍾情非負心人可比春花女道原來如此諺雲娶則妻奔則妾自媒近奔妾願以小星而待君了但恐他日梅雪二夫人未必肯相容耳柳友梅道小生非系鍾情可無求于淑女既求淑女安有淑女而生妒心者倘後日書生僥倖若背前盟有如此月春花女道若得相公如此用心雖倉促一言天地鬼神實與聞之縱使海枯石爛此言亦不朽矣只是賤妾尚有一言相贈柳友梅道小娘子金玉敢求見教春花女道千秋才美固不須于功名富貴然天下所重者功名也今柳相公既具拾芥文才如山德行今年又適當鹿鳴時候若一舉成名便百般如願矣賤妾深有望于相公柳友梅道小娘子至情之言當銘五內倘得十進後會有期二人說罷只聽得雞聲三唱天色已明柳友梅就起身出門春花女直送至門首臨行又囑咐道柳相公前程得遂莫負此盟一邊說一邊落下幾點淚來柳友梅至此轉忍不住也眷戀了一回沒奈何只得分手別去正是意合情方切情深別自難丈夫當此際未免意情牽未知柳友梅別後何如且聽下回分解
