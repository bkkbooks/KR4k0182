body:
  text: 第十三回連及第馳名翰院詩曰人生何境是神仙服藥求醫總不然寒士得官如得道貧儒登第似登天玉堂金馬真蓬島禦酒宮花實妙丹漫道山中多甲子貴來一日勝千年卻說雪太守去後公子雪蓮馨遂進後衙來雪夫人接住含著淚眼問道你爹爹臨去可有什吩咐你這番事因什起的雪公子道爹爹說這事總爲詩題一事起的如玉小姐聽見不免也掉下淚來道如此說來倒是我們做孩兒的帶累爹爹了雪公子道這也不獨爲此總是如今權臣當道小人得志君子道消故有此事不過借此爲由耳雪夫人道你爹爹去後還是在此還是回蘇雪公子道爹爹吩咐家眷即發回蘇我就去同柳姐夫商議入京雪夫人道既如此我這裏可就打點回蘇你可就到山陰柳姐夫家商議進京一來看你爹爹二來就好會試只是你到柳姐夫處他是有才學的必有識見須與他商議一個萬全之策保得你爹爹無事才好雪公子道孩兒自然與他細細商議母親且請寬懷雪大人道長安險地就是你到京中凡事也要留心謹慎雪公子道這個自然只是母親與二姐姐在家且莫憂愁孩兒到京便有消息雪夫人道正是須早寄個信來雪公子忙收拾行裝別了雪夫人二小姐叫一能事家人跟了一徑到山陰來尋柳友梅卻說柳友梅自中瞭解元家裏送旗匾設筵宴親朋慶賀好不熱鬧只待諸事略定就要到雪太守處行過梅雪二小姐的聘定那尋梅問柳的姻緣並去再訪春花踐卻前盟以完終身大事方快心暢意忽報雪蓮馨也中了心下益發歡喜及過數日忽聞雪公被拿心上好生驚訝暗想道這禍從何而來我想雪公平日清廉又無大故如何被拿總是找良緣不偶好事多磨故多這些翻雲覆雨的事功名雖稍遂佳人猶未諧叫我柳友梅如何放心得下但此事必有緣由不知從何處起想了一想道是了是了一定又是劉有美與張良卿這匪人在嚴府裏邊弄出來的了他今進京已有半年多了深恨雪公查詩並科舉無名的事爲此又起這段風波耳才想念間忽抱琴報道外面雪相公拜訪家人呈上名帖柳友梅忙出來迎接相見過柳友梅道嘯雪亭一會不覺已自半年忽聞秋翮搏雲佇看春龍奮迹雪蓮馨道吾兄月桂高攀不日杏林獨步小弟駑馬之駕焉敢望其後塵柳友梅道只不知岳父盛德爲何罹此奇禍今岳母家眷尚在杭城否雪蓮馨道奉家嚴之命已發回蘇了柳友梅道正該如此以避不測但不知此事禍從何起吾兄可曉得麽雪蓮馨道小弟年幼未諳世務只是家父臨行曾說此事總爲詩題一事起的小弟想詩辭不過小事爲何觸怒聖明柳友梅道如此倒是小弟累及岳父了雪蓮馨道這與吾兄何干柳友梅道吾兄未知其詳岳父春間曾有一詩題在外小弟曾于西湖遊玩同一敝友劉有美題過又于月下聞吟同一張良卿詠過後將二詩送到岳父府中不料竟被二人竊取寫做自己的反把小弟原詩沈沒過了直到岳父錄科面試方知小弟原詩次日岳父遣使來邀小弟又被一小人誤認因此親查方知二人作弊情由小弟蒙岳父提摯兼附絲蘿二生被黜自覺情虛一同避進京去一向不知下落近日有人傳說他二人現在嚴相公門下這風波一定是他起的雪蓮馨道原來有這一段情由這風波從此而起一定無疑但目今事體卻如何區處爲妙柳友梅道嚴相國炎炎之勢舉朝憚他夏貴溪尚且不免楊椒山已被刑戮力難與爭近日只好以利誘之但岳父清廉哪得許多使用我有一敝友極相契誼家道頗富饒做人又慷慨常有鮑叔陶朱公之風可將此事告托他與他貸銀周旋我想吾友爲人任俠自慨然允從就一力仗托他是了雪蓮馨道只是何人便得有此俠骨柳友梅道不是別個便是竹鳳阿兄雪蓮馨道原來就是竹兄他原來如此義俠明日就同吾兄去拜託他柳友梅道還有一事他令叔竹淇泉現爲兵部尚書又與岳父同年一發托他在裏面周旋他在同年面上自肯出力這便可保無事矣雪蓮馨道吾兄所見甚是但不知鳳阿兄今年曾中麽柳友梅道文場見屈弟深爲扼腕今又去應武舉了也在早晚一定有報雪蓮馨道明早可同兄拜訪當晚雪蓮馨就在柳友梅家住下次日就同到竹鳳阿家來備說前事就把雪蓮馨的來意柳友梅一一拜託了他竹鳳阿聽了不覺怒氣沖冠目睜髮指擊節道天下有這樣不平的事原來張良卿劉有美二小人又生這段風波來害年伯真可惡也看來世態金能語說到人情劍欲鳴正今日之謂矣老年伯的事通在小弟身上二兄不必憂慮柳友梅道得如此足感大恩雪蓮馨道仁兄高誼可薄雲天真是陶朱鮑叔之義風又具荊軻聶政之俠氣幾令小弟望拜下風尚未知銜結何地竹鳳阿道誼屬通家事關知己況老年伯以無故受禍事在不平弟當拔刀相助敢望報乎三人才說罷只見門外一群人蜂擁進堂竹鳳阿驚問何事衆人道新解元是哪一位竹風阿疑是尋柳友梅的道這不是衆人道不是是武解元竹相公柳友梅道這就是了鳳阿兄恭喜恭喜衆人隨擁著竹鳳阿竹鳳阿隨停當了報錄人就留柳友梅雪蓮馨到後書房坐下商議進京柳友梅道恭喜吾兄武闈高中不日也要進京小弟與蓮馨兄便附驥相從何如竹鳳阿道若得二兄同行甚好並約了楊連城兄一來就好打探老年伯消息二來知己同行亦不寂寞只是事不宜遲即日就該起身柳友梅道正是宜速行了明日出行最利就是明日起身罷竹鳳阿道今晚打點明日就行柳友梅便歸去別了母親又去約了楊連城來叫抱琴搬了行李鋪陳竹鳳阿打點了銀子雪蓮馨家眷已發回蘇又無耽擱叫了船三人便星夜起身趕進京去卻說雪太守被校尉拿進京中便拘禁在獄原是張劉二人在嚴府弄的手腳又無大故因此到柳友梅雪蓮馨竹鳳阿來京尚未審問竹鳳阿隨即與叔父竹淇泉說了在嚴府裏說明挽回上下使用去了半萬之數方得事松雪太守見父子翁婿已在一處倒已心寬柳友梅在京中捱過殘冬到了新年轉眼又是春闈柳友梅與雪蓮馨楊連城等一同入場應試真是文齊福齊柳友梅已高中了第九名進士雪蓮馨也中了第八十名進士楊連城也中了第九十名進士及至殿試柳友梅中了第一甲第三名探花及第欽賜翰林學士雪蓮馨是第二甲第十名也選了館職楊連城是第三甲進士選了蘇州府理刑竹鳳阿去應試武闈倒高中了第一名武狀元因這一年邊報緊急聖旨欽賜文武狀元一體優禮同到金階面聖欽賜禦酒宮花遊街三日並宴瓊林好不榮耀正是十裏紅樓映遠溪狀元歸去杏鶯啼人生莫羨榮華境只要文章福運齊要知柳友梅去後何如且聽下回分解
