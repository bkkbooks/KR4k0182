body:
  text: 第十六回點宮秀暗添離恨詩曰一番風鶴一番驚閨閣幽情自不禁舊恨乍隨流水逝新愁又似白雲深魚書寄去成空問鳴信傳來莫慰心留得貞風付才子蘭房有日共調琴卻説雪夫人與如玉小姐瑞雲小姐因聽李半仙説了出使邊庭的話心上好生憂悶只得叫家人出外打聽並往報房看報回話家人去了一日才回對夫人説道小的日間打聽又往報房查看説出使邊庭事果真太老爺與柳老爺通已辭朝出塞去了為此不能個歸聞説又是嚴府舉薦出來保奏上去的不知又是何故夫人與二小姐聽説通驚得面如上色雪夫人道這是哪里説起我想塞外長驅又況敵情難測你爹爹年已遲暮你丈夫亦系書生如今深入虎口豈能免不測之禍如玉小姐亦垂淚説道料此番一去多凶少吉況系嚴賊薦舉明明設阱陷人只是我母女三人為何薄命至此瑞雲小姐心上亦甚憂疑但見母親與姐姐在那裏悲切不好更添愁恨只得勸解道雖然如此母親與姐姐且免愁煩看來李半仙的課果系如神他説爹爹自身目下尚不能歸一定還有虛驚這出使邊庭的話分明應驗了他説先有音信子侄歸來且看後來消息何如倘僥天幸或得無事也未可知母親還請放心雪夫人道課雖如此只是叫我如何放心得下三人説話間只見家人進來報道好了好了夫人小姐不須憂慮老爺已有家書到了就把家書呈上雪夫人道是誰寄來的那寄書人曾留下麼家人道是一位姓張的相公寄來小人要留他他忙忙地説道我有事要緊到杭州還要寄書到山陰新探花柳老爺家去因此小人不曾留得夫人與二小姐連忙拆開書看只見寫道愚夫雪霽諭道賢妻玉貞自我去後賴吾祖宗福澤及皇天蔭佑宰保無事更喜春闈一子一壻並登科第尤出望外不料樂極悲生禍從福始柳賢壻以力辭嚴府婚姻遂致賈禍及今與我並使邊庭尚不知身首何處但我一身殉國義不容辭轉思二女無歸決宜改嫁字到當即遣媒另作良緣不日朝廷採辦宮女仍恐旨急下勿至臨時後悔料我二人國家事大身家事小歸期難蔔先此預聞雪夫人看畢不免頓足道如此怎了如此怎了二小姐看見也不覺驚呆了半晌仔細把書一看雪小姐道母親且不要慌這書中的字不是爹爹的手迹況且又無年月印信多分又是假的如玉小姐看了也笑道看來又是姦人所為若是真的那寄書的人為何就去雪夫人道哪裏就見得不是真的如玉小姐道字迹不真又無年月印信眼見是假況退婚大事爹爹與柳生何等交情焉有他意未從就寫字歸來而令別嫁者瑞雲小姐道才説寄書人姓張一定是昔日題假詩的張生耳只是姦人作惡為何種種至此雪夫人始初疑惑被二小姐看出書中真偽一篇慰説便心寬了一半但只愁出使邊庭心上終有許多憂慮又過了數日只聽得家人説來外面紛紛揚揚要點采秀女之説不知可真忽一日家人來報道夫人如何是好外面點秀女之説果系真了夫人道哪里見得就真家人道某處已在哪里議親某家已在哪里成婚又聞某家略遲了些已報了名字去了不論大家小戶通甚驚惶如今太老爺及柳老爺已北去了小老爺又不見回來並無一個實信如今卻怎生區處雪夫人道眼見為真前日書雖是假的這個卻不是假的了如何是好不免又有些媒婆聽知雪府裏有兩位小姐便一個來一個去進來議親雪夫人雖立定主意哪里回得絶他一日裏有兩個媒婆進來一個姓花一個姓李一同見過了夫人又見過了兩位小姐那兩個媒婆便把二小姐上下仔細一看便笑説道媒婆不知走過城中多少鄉宦人家見過了許多小姐從沒有似二位小姐這樣標致的果然好個千金小姐雪夫人道你兩人又是哪家來的那花婆道媒婆是張員外家差來夫人處説親的那李婆道媒婆不是別家是本府有名的劉員外家差來到夫人小姐處求親的雪夫人道又是什麼姓張姓劉的你自説姓劉的是哪家姓張的又是哪一家花婆道張員外是蘇州有名的張十貫家他只生得一子人物又豐厚家道又富饒新在京師納監歸來聞知雪老爺府中小姐的才貌又見外邊婚娶甚多因此特差媒婆到夫人處懇求那李婆道我家劉員外家與張員外家系是至戚就是有名的劉百萬家他家大相公一同張相公在京師納監回來在京中也曾會過雪老爺與雪老爺也是極相契的因此便曉得府中有二位小姐一到家便要差媒婆來求親近日正值人家盛行婚娶為此特來議親夫人這是絶好的一頭親事莫要錯過雪夫人道但我家二位小姐我老爺在家時已曾定過今科新探花柳老爺家的了一等回來便要成親李媒婆道原來夫人還不知新探花的信麼新探花出使邊庭被北人拘留住了也看上了新探花的才貌北主竟招他做駙馬去了夫人還想他回來麼雪夫人聽了驚呆了半晌忙問道你哪里曉得李媒婆道就是昨日他們兩位相公在京師回來的信哩花媒婆道聞説出使邊庭是雪老爺與柳老爺同去的昨説雪老爺已放回柳老爺招為駙馬是斷斷不能回來的了雪夫人道但不知此信可真否李媒婆道怎麼不真是他相公們昨日在那裏親口説的媒婆偶爾聽得聽他兩位相公説來卻又一樣花媒婆道正是説來一樣所以可信雪夫人聽他兩個婆子你一句我一句説得像個真的了便嚇得面如土色不免頓足道此信若真便鏡拆叉分良緣割斷了李媒婆道夫人且不要慌有兩位這樣如花似玉的小姐在媒婆身上婚配那兩位多才多貌的相公夫人下半世正受用不盡哩花媒婆道只是如今朝廷要點秀女婚娶只在早晚斷遲不得李媒婆道只等這裏夫人與小姐允從了我們就去回復了二員外就好行聘了雪夫人道雖如此説也還要等我家太老爺或小老爺回來方好作主花媒婆道小老爺不知在幾時回來李媒婆道夫人點秀女是早晚間事如何待得老爺回家雪夫人道這事終要待他回來作主媒婆見説不上只得告辭起身道既夫人主意未定待媒婆明後日再來討回音罷只是夫人不要錯過了好親事説罷花李二婆子就出去了雪夫人將二媒婆的説話説與二小姐得知二小姐當媒婆説話的時節已在內房聽見至此正在那裏掩淚對位又聽雪夫人一説直驚呆了如玉小姐道總是紅顔薄命數該如此但忠臣不事二君烈女豈更二夫我心如石斷無轉移瑞雲小姐道寧可人負我莫使我負人生為柳生妻死作柳家鬼莫説媒婆來説親就是朝廷要點我去也拋一死做個貞節女不願為失節婦也雪夫人道三貞九烈固婦人有志的事但恐目下朝廷要點秀女不容人作主如何是好你爹爹既無實信你弟弟又不回來叫我一婦人怎生區處瑞雲小姐含淚説道母親你不必憂疑孩兒聞十朋之妻投江自盡至今貞風千古流芳百世私心竊願效之如玉小姐亦垂淚道小青有雲祝發空門洗心浣慮入宮有緑雲之粉黛諒無素頂之娥眉竊願長作廢人以了今生孽債雪夫人聽見二小姐説到傷心不免墮下淚來二小姐亦潸然出涕正在悲淒之際只見家人報道夫人不好了不好了不知何人已將二小姐的名字報進府縣去了只在早晚采辦官要來點名查驗了雪夫人道如此怎了如此怎了二小姐聽説嚇得面也失色神飛魄散了不覺嗚鳴咽咽哭將起來如玉小姐忙到房中把青絲剪下朝霞急來勸時早已剪落瑞雲小姐哭了一場忙尋自盡要學錢玉蓮投江的故事了雪夫人見二小姐如此行徑心下十分煩惱卻又無可奈何倒是朝霞説道夫人小姐俱不要驚慌亂了方寸朝霞倒有一計在此雪夫人道有何妙計你且説來朝霞道如今事在危急我家小姐已把青絲剪落扮作道裝料然沒事只是二小姐要尋自盡心雖貞烈如何使得且夫人只生得這位小姐勝似掌上珍珠倘小姐一行此志夫人何以為情況有日玉鏡重圓未免鴛鴦先拆小姐是斷斷死不得的瑞雲小姐道死生固大豈不痛心只據今日看來未免性命事小失節事大故寧拋一死以謝柳生耳朝霞道小姐心雖貞烈也不要把性命忒看輕了諺雲千金之子不死于盜賊為其身可愛也小姐千金之軀為何遂不惜死朝霞蒙夫人小姐撫養成人今小姐有難朝霞豈敢愛身朝霞情願將身代小姐一行何如雪夫人道若得你如此好心真可謂女中俠士不意裙叉有此忠膽瑞雲小姐道此餘前世自作之孽何忍連纍及你正説間忽見家人走進來道夫人採辦官即日要到了如何是好朝霞道事急矣快把小姐身上的衣服脫與朝霞穿了小姐速速避去只留我家小姐在此他們見剃發出家自然罷了朝霞便認做了二小姐一行雪夫人見事勢沒法只得叫瑞雲小姐把身上衣服脫與朝霞穿了朝霞穿起宛然與瑞雲小姐一般正是雖然不似千金體也有娥眉一段嬌不一時採辦官到了隨照花名查驗點到如玉小姐見已是一個剃發尼姑忙叱道為何出家人也報了他連忙去了名字點到瑞雲小姐朝霞走上前面採辦的內使把來仔細一看喝采道好一個有造化的女子明日自中上意衆人就把朝霞扶上了轎蜂擁而去姑蘇城裏紛紛揚揚到處只道是雪太守的女兒點去了正是無端風雨來相妒吹落枝頭桃李花直待東君親作主這番春色許重嘉不知朝霞去後梅雪二小姐的姻緣畢竟何如且聽下回分解
