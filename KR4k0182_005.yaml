body:
  text: 第五回棲雲庵步月訪佳人詩曰世間何事最難禁才色相逢意便深在昔文王歌窈窕至今司馬露琴心千秋佳話非虛業百載良緣實素襟拙鳩空有爭巢力哪得鴛鴦度繡針話説柳友梅自那日遊湖遇見二美人之後心下十分想慕甚至廢寢忘食到了次日先打發抱琴回去自己只托為考試進城就與竹鳳阿楊連城作別劉有美亦自托有事別去不題只有柳友梅心上想著二位美人一徑往杭城中來各處物色並無下落只得回身轉出城來行了數裏不覺日色漸西那向西的日色最易落去復行了數裏到了一個曠野所在柳友梅此時心上已走得個不耐煩但遠遠望見一個小庵中間樹林陰翳竹影交加雖然小小結構卻也幽雅可愛柳友誨尋訪了一日不免神思困倦巴不能到個所在歇息遂一徑到小庵來那小庵門前抱著一帶疏籬曲曲折析鮮花細草點綴路徑到得庵門門栽著數株杉樹排列著三四塊文石柳友梅便於石上小憩只見庵門上邊額著棲雲庵三字中間走出一個老僧近前把柳友梅仔細一看驚問道相公莫非柳月仙麼柳友梅驚起忙問道老師何得就知小生姓名老僧道老僧昨夜偶得一夢夢見本庵伽藍菩薩吩咐道明日有柳月仙到此他有姻緣事問你你須牢待他今日老僧因此等了一日並無一人直到這時候才遇見相公故爾動問柳友梅一發驚訝暗想道此僧素不相識曉得我的姓氏已就奇了為何把小生的心事都説出來我正要尋訪二美人的下落何不就問他一聲因上前作揖道老師必是得道高僧弟子迷途乞師指示那老僧道不敢不敢且請到裏面坐柳友梅隨著老僧就一步步到正殿殿上塑的是一尊白衣大士柳友梅拜過老僧就延至方丈施禮畢分賓主坐下待過茶那老僧問道請問相公尊居何處因什到此柳友梅道小生山陰人氏先京兆就是柳繼毅昨同敝友遊湖偶爾到此老僧道原來就是柳太爺的公子失敬了數年前小僧在京時也曾蒙令先尊護法是極信善的不意就亡過了可歎可歎柳友梅道敢問老師大號老僧道衲號靜如柳友梅道敢問老師與小生素未相識緣何便知小生姓名且獨見肺腑隱情老僧道小庵伽藍最是靈應老僧因夢中吩咐故爾詳察到此老僧哪里得知柳友侮道原來如此靜如就吩咐道人收拾晚齋柳友梅又問道寶剎這樣清潔必定是一方香火了但不知還是古剎還是新建靜如道小庵叫做棲雲庵也不是古迹也不是一方香火乃是本府雪太守捐俸建造的已造了四五個年頭柳友梅道雪太爺為何造于此處老僧道太爺只因無子與他夫人極信心奉佛為此建造這一所正殿供奉白衣觀音要求子嗣連買田地也費了一二千金柳友梅道如今雪太爺有子麼靜如道兒子終有一個他未生子時已先生下一位小姐柳友梅道莫説生一位小姐便生十位小姐也比不得一個兒子靜如道柳相公不是這般説若是雪太爺這位小姐便是十個兒子也比不得柳友梅道卻是為何靜如道這位小姐生得有沈魚落雁之容閉花羞月之貌自不必説就是些描鸞刺繡樣樣精工也不為稀罕最妙是古今書史無所不通做出來的詩詞歌賦直欲壓倒古人就是雪太爺的詩文也還要他刪改柳相公你道世上人家有如此一個兒子麼柳友梅聽見説出許多美處不覺身脈酥蕩神魂都把捉不定起來暗想道據老僧説來劉有美之言驗矣忙問道這位小姐曾字人否靜如道哪里就有人字柳友梅道他父親現任黃堂怕沒有富貴人家門當戶對的為何尚未字人靜如道若論富貴這就容易了雪太爺卻不論富貴只要人物風流才學出衆柳友梅道這個也還容易靜如道還有一個難題目雪老爺意思原欲就于任上擇壻但是來議親的或詩或賦要做一篇直等雪太爺與小姐中意方才肯許偏有那小姐的眼睛又高遍杭城秀士做來詩文再無一個中意所以耽擱至今一十七歲了尚未字人聞得近日雪太爺又出什麼新巧詩題叫人吟詠想也是為擇壻的意思柳友梅道原來如此心下卻暗喜這段姻緣卻就在這裏明白又想道只是所聞又如所見眼見的是兩位耳聞的又只是一個又不見有些疑惑只是一個美人有了消息那一位美人不愁無下落矣不一時道人排上晚齋二人吃了不覺月已昏黃靜如道相公今日行路辛苦只怕要安寢了便拿了燈送到一個潔靜房裏又燒一爐好香泡一壺苦茶放在案上只看柳友梅睡了方才別去柳友梅聽了這一片話想起那湖上遇見的兩個美人與靜如所説的小姐不勝歡喜只管思量便翻來覆去哪里睡得著只得依舊的穿了衣服起來推窗一看只見月色當空皎潔如同白晝遂步出庵門前間步一束月色甚佳一來心有所思不覺沿著一帶疏籬月影便出庵門離有一箭多遠忽聽得有人笑話柳友梅仔細一望卻是人家一所花園園內桃李芳菲便信步走進去走到亭子邊往裏面一張只見有兩個人一邊吃酒一邊做詩柳友梅便立住腳躲在窗外聽他聽見一個穿黃的説道下面這個險韻虧你押那個穿緑的道下面的還不打緊只上面這幾個字哪一個不是險韻費了心了除了我老張再有哪個押得來穿黃的説果然押得妙越地才子不得不推老兄再做完了這結句那女壻便穩穩地做得成了穿緑的便低著頭想了又想哼了又哼直哼唧了半晌忽大叫道有了有了妙得緊妙得緊忙忙拿筆寫在紙上遞與穿黃的看穿黃的看了便拍掌道妙妙真個字字學老杜不獨韻押得穩當且有許多景致兄之高才捷足弟所深服者也穿緑的道小弟詩已成佳人七八到手兄難道就甘心罷了穿黃的道小弟往日詩興頗高今夜被兄壓倒再做不出且吃幾杯酒睡一覺索性養養精神卻苦吟一首與兄爭衡穿緑的道兄既要吃酒待小弟再把此詩吟詠一遍與兄聽了下酒如何穿黃的道有理有理穿緑的遂高吟道雨落階前水滿溪緑繩牽出野牛西風大吹開楊柳絮片片飛來好似雞穿黃的也不待吟完便亂叫道妙得甚妙得甚且賀一杯再吟遂斟一杯遞與穿緑的穿緑的歡喜不過接了酒一飲而幹又續吟道煙迷隱隱山弗見波起皺皺湖不齊畫也難描昔日景船中歌曲像鶯啼穿緑的吟罷穿黃的稱羡不已贊道後面兩聯一發好得緊柳友梅在窗外聽了忍不住失聲笑將起來二人聽見忙趕出窗外來見了柳友梅便問道你是何人卻躲在此處笑我們柳友梅道學生偶爾看月到此因聞佳句清妙不覺手舞足蹈失聲唐突多得罪了二人看見柳友梅一表人物説話又湊趣穿黃的道兄原來是知音有趣的朋友穿緑的道既是個妙人便同坐一坐何如便一把手扯了柳友梅同到亭子中來柳友梅道小弟怎好相擾穿緑的道四海皆兄弟何妨遂讓柳友梅坐了叫小的們斟上酒因問道兄尊姓大號柳友梅道小弟賤姓柳表字月仙敢問二位長兄高姓大號穿黃的道小弟姓李賤號個君子之君文章之文因指著穿緑的説道此兄姓張尊號是良卿乃是敝地第一個財主兼才子者也這個花園便是良卿兄讀書的所在柳友梅道如此失敬了張良卿道月仙兄這樣好耳隔著窗便都聽見了詠便詠個春郊只是有些難處柳友梅道有什難處張良卿道最難是首尾限韻小弟費盡心力方得成篇柳友梅道誰人出的詩題要兄如此費心張良卿道若不是個妙人兒小弟焉肯費心柳友梅道既承二兄相愛何不一發見教李君文道這個話兒有趣容易説不得兄要説時可吃三大杯便説與兄聽張良卿道有理有理遂叫斟上酒柳友梅道小弟量淺吃不得許多李君文道要聽這趣話兒只得勉強吃柳友梅當真吃了張良卿道柳兄妙人説與聽罷這詩題是敝府太尊的一位小姐出的那位小姐生得賽西施勝王嬙十分美貌有誓不嫁俗子只要嫁個才子詩詞歌賦敵得他過方才肯嫁太尊因將這難題目難人若是做得來的便把這小姐嫁他招他為壻因此小弟與老李拼命苦吟小弟幸和得一首這婚姻便有幾分想頭柳兄你道好麼柳友梅聽了明知就是靜如所言卻不説破只説道原來如此敢求原韻一觀張良卿道兄要看時須也做一首請教請教柳友梅道弟雖不才若見詩題也杜撰幾句請正張良卿在拜篋中取出原韻遞與柳友梅柳友梅看了分明是湖上吟詠的二題假意道果然是難題目好險韻好險韻張良卿道既已看了必求做詩柳友梅道班門弄斧只恐貽笑大方李君文道我看柳兄如此人物詩才必妙莫太謙了遂將筆硯移到柳友梅面前柳友梅不好推遜只得提起筆抻抻墨就吟詩一首雲春閨雨後輕寒半野溪緑機懶織日西風簾靜卷雕梁燕片月催殘茅店雞煙鎖天涯情共遠波深春水思難齊畫眉人去歸何日船阻關河猿夜啼柳友梅寫完了遞與二人道勉強應教二兄休得見笑二人看了柳友梅筆不停書文不加點信手做完甚是驚訝拿來念了兩遍雖不深知其意念來卻十分順口不像自己七扭八拗因稱讚道原來柳兄也是一個才子可敬可敬柳友梅道小弟俚言獻醜怎如張兄字字珠玉張良卿道柳兄不要太謙小弟是從來不肯輕易贊人的這首詩果然和得敏捷而快合式而妙柳友梅道張兄佳作已領教過李兄妙句還要求教李君文道小弟今日詩興不發只待明日見過小姐的真詩方做哩柳友梅道原來李兄這等有心但小姐的真詩如何便得一見李君文道兄要見小姐的真詩也不難只是他兩個題目兄只做一首恐怕還打不動小姐兄索性把這春郊的詩一發做了小弟明日便把小姐的真詩與兄看柳友梅道李兄不要失言張良卿道李兄是至誠君子小弟可以保得只要兄做得出第二首柳友梅此時已有幾分酒興又一心思量看見那小姐的真詩便不禁詩思勃勃提起筆來又展開一幅花箋任意揮灑不消半刻早又和成一首春郊詩遞與二人二人看了都嚇呆了口中不言心下道這才是真正才子細展開一看只見上寫道春郊雨過春色媚前溪絲柳牽情系浪西風陳穿花驚夢縣片雲銜日促鳴雞煙光凝紫連山迥波影浮紅耀水齊畫意詩情題不到船樓鼓吹聽鶯啼二人讀完了便一齊拍案道好詩好詩真做得妙柳友梅道醉後狂愚何足挂齒那小姐的真詩還要求二兄見賜一看李君文道這個自然明日覓來一定與兄看就是倒不曾請教得吾兄不像這裏人貴鄉何處因什到此今寓在何處柳友梅道小弟就是山陰縣人昨到城中訪一朋友出城天色已晚今借寓在前面棲雲庵偶因步月得遇二兄張良卿道原來貴縣就是山陰原是同省今年鄉試還做得同年著哩柳友梅道不惟同省益且同學小弟倒忝在錢塘學中張李二人道原來兄貴庠倒進在這裏我説兄必竟是個在庠朋友若是不曾進過的哪有這等高才捷作兄既寓在棲雲庵一發妙了明日奉拜就可見小姐的真詩了三人一心都想著小姐只管小姐長小姐短不覺厭煩你一句我一句説得有興復移酒到月下來吃直吃得大家酩酊方才起身張李二生送出園門柳友梅臨別時又囑咐道明日之約千萬不要忘了二人笑道記得記得三人別了此時已有三更時候月色轉西柳友梅仍照舊路回到庵中去睡心下想道我道佳人難遇必須尋遍天下不期就在杭郡訪著可謂三生有幸又想道訪便訪了一個佳人的消息只是那一位元美人不知又在何處倘若一般俱不能成美成個虛相思卻也奈何既又想道既有了消息便蹈湯赴火也要圖成難道做個望梅止渴罷了麼左思右想真個億萬聲長籲短歎幾千遍倒枕捶床直捱到數更才朦朧睡去正是才人愛色色貪才才色相連思不開必竟才郎懷美色果然美色惜真才未知柳友梅畢竟何如且聽下回分解
