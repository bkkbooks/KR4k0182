body:
  text: 第十七回雪蓮馨辭朝省母詩曰雙親未老已成名人世榮華莫與衡有子果然諸事足辭官原不為身輕離愁頓減同花笑歡喜相逢擬夢情獨有倦遊人未至空令二美計歸程卻説二小姐聞了柳友梅出使邊庭招贅駙馬之説心下已自驚慌忽遇朝廷又點宮女被人竟把名字報進急得沒法如玉小姐只得把頭髮剪下扮作尼姑瑞雲小姐要投江死節幸虧朝霞一個女使反有丈夫氣骨親身代往力救此難這一日點去後雪夫人與二小姐倒好生放心不下只得叫家人去打聽看採辦官幾時起身並看老爺回來的消息家人去了不題卻説這報名的事原是劉有美同著張良卿在嚴相公門下時聞知雪公與柳友梅出使邊庭中了他計又聞朝廷不日往蘇杭採辦宮女便道是天賜機緣因此在京中商議寫了一封假書二人給了假星夜趕回蘇州把假書叫張良卿先送至雪夫人處慌了他手腳亂了他主意然後又叫媒婆來吩咐了他進去説親造出一段招附馬沒對證的事來哄騙他誰料雪夫人立定主意要等雪公回來二小姐又立志不肯再嫁媒婆來回復了心上又氣又惱又沒法只得暗暗把二小姐的名字報進府縣做個大家不得行個賠了夫人又折兵的計策這一日聞知雪小姐已點去採辦官要上京了復細細打聽方曉得是一位小姐一個小姐已落發為尼了心上又好笑又反悔又可惜沒奈何只得往杭州到家中看看再作道理張良卿與劉有美遂一同回杭州不題且説雪夫人叫家人出去打聽家人去了一日方回來道稟知夫人採辦官明日就起身了太老爺的消息出使後尚未有報聞説小老爺已告假還鄉就同蘇州府理刑楊老爺一同出京的今早府裏人已去接了也只在早晚就到雪夫人道若早到一日這點宮妃一事也就易處如今已是遲了幾壞了我二位小姐空送了一個俠女正説間忽報小老爺回來了雪夫人聽了心上不勝歡喜恰如拾著了活寶的一般不多時雪蓮馨已進內堂雪夫人忙來接著便説道我兒你回來了麼雪蓮馨答道正是孩兒回來了隨跪在地下拜了母親四拜又與如玉小姐瑞雲小姐相見過雪蓮馨把如玉小姐仔細一看記得昔日緑雲烏鬢今變為道扮仙裝不勝驚訝又見二姐姐對著雪蓮馨俱垂首掩淚心上一發疑惑暗想道卻是為何又見母親看了二小姐掩淚亦為出涕不語雪蓮馨道孩兒為家國多艱久離膝下有缺晨昏望恕孩兒不孝之罪雪夫人道這也不消説了才要開口不免又掉下淚來雪蓮馨忙問道今日母子重逢至親聚首正宜歡喜為何母親面帶憂容二姐姐也愁眉不展只是掩淚卻是何故雪夫人只得拭幹了淚眼説道自你去後家中不知受了多少驚惶去歲聞你爹爹平安心上稍寬及到今春報你與柳姐夫通中了不勝可喜感謝天地哪曉得直到夏間反無音信我與你二姐姐又起了無限憂愁誰料後來傳説你爹爹與柳姐夫出使邊庭這一驚真是不小但尚未知真假直待你爹爹書到方知此説是真書中又説朝廷採辦宮妃二女決宜改嫁的事這一日叫我母女三人通驚呆了孩兒朝廷雖采辦宮妃柳姐夫雖出使外域你爹爹為何競寫起改嫁二字來雪蓮馨驚問道母親這是哪里説起爹爹並無書來家為何説起改嫁二字雪夫人道這家書到虧你一位姐姐識破知是假的方才放心哪曉得日後點宮妃的事漸漸真了雪蓮馨道點秀女是上意果是真的但二位姐姐系是出使大臣的婦女人也不敢妄報雪夫人道可恨將名已報去人已點去了雪蓮馨道哪有此事如今二位姐姐現在雪夫人道若不是這個義俠女你二姐姐已自不在了今二位姐姐雖在你柳姐夫卻已不在叫你二位小姐雖生之日猶死之年矣叫你做娘的憂容何日得開你二位姐姐的愁眉何日得展言至此不覺又墮下淚來雪蓮馨道母親你且免愁煩爹爹與柳姐夫榮歸有日點秀女的事今孩兒已歸料然沒事少開懷抱以俟歸期雪夫人道你姐夫出使邊庭北主已招為駙馬哪里還有歸期你大姐姐已矢志空門二姐姐幾置身魚腹縱使掬盡西江洗不淨愁腸萬斛叫我如何得開懷抱雪蓮馨道原來如此這招贅駙馬之説卻又從何處説來雪夫人道也從前日點宮女時節與你姐姐説親的傳來説他在京師曉得的雪蓮馨道孩兒離京時曾打探爹爹消息並不聞有此信哪有此事此總是姦人作惡造捏百端欲使人墮其詭計耳雪夫人道據你説來此事又誰人造出雪蓮馨道母親可記得那日來説親的是説哪一家雪夫人道我尚記那日是説姓張姓劉的兩家雪蓮馨道都分又是張良卿劉有美二小人造此風波耳他在京與嚴府到柳姐夫處説親今聞柳姐夫出使又乘機構釁前聞他二人也告假回來必定是他兩個姦人心曲真似羊腸幸二位姐姐貞心始終如一佇看玉鏡重圓會見鸞叉復合雪夫人被兒子一篇安慰一番分剖方回嘖作喜道若得如此慎毋忘義女朝霞雪蓮馨道朝霞又為什來雪夫人道朝霞已代吾女點進宮去了遂將點秀女朝霞身代之事細細與雪蓮馨説了雪蓮馨歎道不謂女流有此俠骨是紅裙中紀信矣聞楊年兄與採辦的內使在京曾有一面想尚未起身明日待孩兒同楊年兄去拜他可把朝霞認為親妹他自然另眼相看不敢待慢且等爹爹與姐夫還朝好動一疏救他出宮就是聖明聞此義俠之女天恩自肯釋放母親與二位姐姐如今俱免憂愁雪夫人道如此甚好叫日你可就同楊年兄往拜想採辦官即日進京矣雪蓮馨道孩兒曉得母子二人説罷如玉小姐與瑞雲小姐聽説柳友梅無事亦放心歸房不題次早雪蓮馨便同楊連城拜過採辦內使就將朝霞認為親妹內使道既系令妹就是奉使北庭雪公的令愛了大臣之女何人便爾輕報但今已造名入册系是上用的了俟明日面聖奏明釋放罷雪蓮馨道得如此足感內使大人恩造説罷二人告辭出來楊連城便打點上任雪蓮馨亦自歸家採辦內使是日便起身進京卻説蘇州點秀女杭州的採辦官也就到了人心惶惑盛行婚娶也像杭州一般李春花母女二人在家急得手足無措李半仙又出門進京去了無計可施然終是小戶人家倒好躲避母女二人商量倒往鄉間母舅處暫避過了罷便連夜叫只小舟鎖著門避去直待打聽採辦官進京了方才回家因此無事正是朝廷行一事百姓便驚心不是貞心女花枝幾被侵畢竟柳友梅如何歸來與梅雪二小姐又如何作合且聽下回分解
