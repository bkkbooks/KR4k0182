body:
  text: 第十回拆開梅雪兩分離詩曰世事翻雲覆雨間良緣難遂古今然達溪花落蠡夫恨鳳凰琴空崔女憐高誼合離原不二鍾情生死實相連佳人端的歸才子聚散由來各有天卻説柳友梅別了雪太守出來抱琴接著復回到棲雲庵來靜如迎著問道近聞雪太守看中意的柳相公詩文一定姻緣有份了柳友侮道不知事體如何靜如道得相公這般才貌也不負太爺擇壻一片苦心柳友梅道不敢不敢遂將張劉二生抄詩周榮作弊之事細細説了一遍靜如道姻緣天定人謀何益柳友梅道只是還有一事請教我今日去見雪公只道他為著令愛的事不料他又為甥女梅小姐的事絶不提起雪小姐之姻緣不知何故靜如道原來雪太爺如此用心正是他為己為人之處老僧向日説柳相公的姻緣不在梅邊定雪邊今日看來方信老僧不是狂言這姻緣兩重自不必説了柳友梅道是便是只恐人心難度或者雪公另有所圖也未可知靜如道料柳相公的才貌瞞不過雪太爺的眼睛縱使雪太爺看不到那小姐的慧心明眼安肯使美玉空埋明珠暗棄麼柳友梅起初心上還有些疑惑被靜如這一席話便一天狐疑都解散了便滿心歡喜笑説道但不知小生何緣便能有福消受此二位佳人説話間已是黃昏時候道人張上燈來靜如道柳相公可用夜飯麼柳友梅道夜飯倒不消了只求一壺茶就要睡了明日好返舍靜如就去泡了茶送與柳友梅柳友梅就到客房中去睡了次早別了靜如回去見過母親楊氏先把張劉二生抄詩一事説了一遍然後把雪太守録科面試請酒題詩親許婚姻的事也細細與母親説知楊氏夫人喜道吾兒素有雅志今果遂矣只是姻緣已遇功名未遂必須金榜名標然後洞房花燭方是男兒得意的事況世情淺薄人心險惡似張劉小人輩也須你功名顯達意念方灰不然未有不另起風波者今考期已近秋闈在邇汝宜奮志以圖上進柳友梅道謹依慈命母子二人俱各歡喜柳友梅此時也巴不能個早登龍虎榜成就鳳鸞交就一意讀書日夜用工按下柳友梅不題卻説雪太守自與柳友梅約為婚姻次早就差人拿個名帖往山陰縣來請竹相公原來雪太守與兵部竹淇泉是同年竹鳳阿隨叔父在京師曾相認過因此請他出來作媒怎知竹鳳阿與柳友梅又是極相契誼的朋友這一日竹鳳阿聞知年伯來請就一徑同差人到杭州來見雪太守雪太守留進後衙相見竹鳳阿道敢問老年伯呼喚小侄不知有何吩咐雪太守道不為別事我有一舍甥女名喚如玉就是舍親梅道宏之女今年一十七歲了姿容妍稚性情聰慧論其才貌可稱女中學士又有一個小女名喚瑞雲年才二八小舍甥女一歲頗亦聰明薄有姿色不但長於女紅頗亦善於詩賦老夫因受過梅舍親之托雖有甥女之分一般如同己出前日因録科這日偶見山陰柳友梅文才俊逸詩思清新是個當今才子我意欲將二女同許雙棲前已面囑柳生只不知他尊慈意下何如因此特煩賢契道達其意竹鳳阿道柳友梅兄才貌果是衛家玉潤與小侄系至友其詩文品行素所欽服老年伯略去富貴而取斯人誠不減樂廣之冰清矣小侄得執斧柯不勝榮幸想柳兄素仰老年伯山鬥未有不願附喬者雪太守道得如此足感大幸只是貴縣到郡中往返相勞為不當耳老夫有一回聘的禮若其尊慈許允即煩賢契致納説罷便在袖中取出繡成的兩幅鴛鴦錦箋遞與竹鳳阿道這就是回聘的禮竹鳳阿道友梅兄未行納采之禮何得就蒙老年伯回聘之儀雪太守道柳友梅曾在敝衙中面詠新詩老夫即將他佳句準為聘禮隨命舍甥女並小女奉和原詩以作回聘之敬這一幅鴛鴦箋便定百年鸞鳳友年侄幸轉致之竹鳳阿道柳友梅兄承老年伯如此垂愛真恩同高厚二人説著話留過小飯竹鳳阿遂告辭起身別去不題雪太守別過竹鳳阿隨要寫書差人到福建去報與梅道宏得知且説梅公自到了福建各處剿撫雖然寇盜漸漸平靖哪曉得閩南煙瘴之地水土不服又值盜賊竊發之際風鶴驚惶況梅公年近六旬氣血漸衰哪受得這等風霜勞苦又想著父女遠離家鄉遙隔心神悶悶不半年便已過勞成疾奄奄不起了只得寫書差人到杭州來雪太守處報知這一日雪太守才要寫書差人到福建去忽報福建梅兵爺差官到雪太守著他後堂相見不一時差官進來拜見過呈上家書雪太守便問道你老爺好麼那差官掩著淚眼只不出聲雪太守看來暗想道卻是為何便又問道你奉老爺差來必有要緊話為何見本府只是不言不語差官只得含著淚説道我老爺只為王事勤勞殷憂成疾差官來時曾於榻前候問已見他骨瘦如柴形容枯稿這多時病體多應不起了雪太守聽説方驚訝道原來你老爺如此大病我這裏哪里曉得我且問你你來時你老爺可有話囑咐你差官道囑咐事盡在書中只是臨行的時節曾有數語囑咐道骨肉天涯死生南北零丁弱女賴記終身叫差官親致雪老爺雪太守聽了不覺撲簌簌掉下淚來不免頓足道道宏休矣道宏休矣遂留差官在外廂伺候雪太守就進後衙把家書與如玉小姐觀看下一時如玉小姐來了就把家書一同開看只見上寫道眷小弟梅皓頓首致書于景翁大舅台座前弟自與兄翁錢塘門分袂到閩且喜小寇漸平奈煙巒瘴癘風鶴驚惶兼之父女睽違家鄉遙隔殷憂孔切舉目靡親人孰無情誰能堪此遂致奄奄不起一病垂危今病體莫支轉念弱女孑無成立撫心自痛回首淒然兄翁苦念骨肉之情不負千金之托如親己女永計終身弟雖生無以酬大德死亦有以報知己也臨榻草草伏冀台原不宣另有一書付如玉女兒開看梅小姐隨展開一看只見上寫道母舅當事之如父舅母當事之如母事舅姑以孝相夫子以順我身死後柩必歸塋言已盡矣汝毋自哀如玉小姐看了真個看一字墮一淚心中硬咽驚得面如土色話也説不出正在悲切之際忽報梅兵爺的訃音到了如玉小姐聽見嚇得神魂都散不覺悶倒在地雪夫人與瑞雲小姐連忙來喚醒不覺嗚嗚咽咽地哭將起來哭了一場瑞雲小姐看見亦為之淚下不題卻説梅公臨終時節吩咐侄兒梅從先要扶柩回金陵安葬祖塋的因此訃音方至靈柩也就到了大船歇在錢塘門到了次日雪太守不免要備些禮物去吊奠如玉小姐也要扶柩回金陵去了只是慮如玉小姐無人陪伴雪太守就叫公子雪連馨同去就順便往金陵納個南雍又著一能事家人伏事了雪公子這一日舟中奠別好不苦楚正是昔日尚生離今朝成死別生離猶自可死別復何如按下梅小姐的事不題卻説竹鳳阿自領了雪公之命不敢怠慢隨即回見柳友梅將一女雙棲的事委曲説了一遍柳友梅道這事在知己前怎好假詞推託只是小弟與家母説來小弟寒儒安能有福遂消受此二位佳人況此事已不知經了多少風波小弟與兄闊別久了不曾與兄細談衷曲今日可試言之便將張劉二生抄詩周榮作弊等事從頭至尾與竹鳳阿説了一遍竹鳳阿道人心之險一至於此可惡可惡只是雪公今日此舉略去富貴下交貧賤是真能具定見於牝牡驪黃之外者佳人難得似功名吾兄慎勿錯過柳友梅笑道據如今看來佳人反易似功名了竹鳳阿道兄今日不要把功名看難佳人就看易了古今絶色佳人不必皆自功名上得的而掀天的功名富貴反自有佳人上來的此範蠡所以訪西施相如所以挑文君也兄已幸遇佳人何患功名不遂説罷便把雪太守付來的二幅鴛鴦箋遞與柳友梅道這便是佳人的真迹功名的左券了柳友梅接來隨把二幅詩箋俱展開一看只見一幅上尋梅和韻落落奇姿淡淡容幽香未許次人逢心隨明月來高士名在深山識遠翁引我情深遺夢裏思君魂斷暗香中一林詩意知何限可欲乘風寄冥鴻又一幅上是問柳和韻臨風遙望意悠然似與東皇合舊緣照酒能留學士醉侵衣欲動美人憐看來月裏神餘媚移到花間影自鮮珍重芳姿漫輕折春深有意與君傳柳友梅看畢卻原來就是和成的尋梅問柳二詩便贊道詩才俊逸真不減謝家吟雪侶果然名不虛傳竹鳳阿道只等尊慈之命便好回復雪公正説間忽見抱琴走進來道學院科考在即府裏録科的案上相公已是第一竹鳳阿道恭喜恭喜柳友梅道小考何喜竹鳳阿道雖然小喜然今日佳人才遇便已功名有基豈不可喜二人説罷柳友梅就進去與母親説知楊氏自然允從就把二詩珍藏好了當晚就留竹鳳阿住下次早柳友梅自己要赴考竹鳳阿要去回復雪太守兩人吃過早膳正好同行便一徑渡過錢塘江來到杭州城才到錢塘門只見一隻大船歇在碼頭滿船挂孝只見雪太守的執事也在船旁不一時雪太守素冠素服在舟中奠別哭聲甚哀竹鳳阿柳友梅看見不勝驚訝道卻是為何忙問衆人衆人道是福建梅老爺的靈柩今日小姐扶回京太爺在船奠別竹鳳阿道原來梅公已死這等弟輩在雪公面上也該走遭柳友梅聽説驚呆了半響道正是也該走遭隨叫抱琴去備了些吊奠的禮物寫了兩張名帖一同到官船邊來致吊二人拜過雪太守就邀二人到自己船中來坐下便對竹鳳阿道前將舍甥小女的事相托賢侄不想梅舍親遂爾去世電光石火能不痛惜竹鳳阿道前領老年伯盛意已一致達柳伯母伯母已自俯從只待秋闈榜發便好諧姻不料梅公竟爾仙遊令甥女轉還有待了雪太守道老夫言出信從雖然有待舍甥女終身便百年永托矣柳友梅道小壻承嶽父洪恩提挈五內銘感今聞梅嶽父仙遊心膽俱裂始終安敢二心雪太守道我也知賢壻鍾情非負心人可比説罷柳友梅因考事迫促只得起身告辭道本該相送因考期在邇不敢停留萬望鑒原雪太守道莫拘細禮這是賢壻前程大事柳友梅只得告辭竹鳳阿也別去不題且説劉有美自録科這一夜回家仍恐雪太守查驗好幾日不敢出頭雪太守見張劉二人如此行徑一定是個小人為此倒不提起到發案日亦以無名字愧之這一日發了案家人來報知劉有美道相公府裏録科案發了劉有美忙問道可有我的名字家人道想是不見有劉有美皺著眉道那雪公忒也好笑詩辭是遊戲事我文字是的真的為何便遺落我又問道第一是誰家人道就是柳友梅劉有美道是我家人道不是是柳友梅相公劉有美道原來是他我説一定是小柳了咦雪老雪老常言道冷一把熱一把你看中意了小柳為何就遺落我起來難道我文字也是假的背著手垂著頭踱了幾踱只見眉頭一皺計上心來道有了有了前日小柳送詩的時節有兩個姓張姓李的同行我也認得他想也是錢塘學裏想那日也往送詩一定也為著雪小姐的事何不尋他商議一商議計較一計較思算已定便吩咐家人道我為考事不遂要進京納監你為我收拾些行李停當今日就要起身説罷便到趙文華處討了一封書薦到嚴府裏去便回家取了行李劉有美已斷弦過了又無內顧之憂一徑到杭州來等那張李二人原來張良卿也為抄詩一事仍恐發覺倒躲在李君文家裏叫李君文在外邊打聽風聲這一日劉有美去尋恰好半路就撞見李君文便上前深深地作一揖道李兄哪里去李君文擡頭認得是劉有美便問道劉兄哪里去劉有美便道有事相商特來拜訪但這裏不是説話的所在必竟要到尊府去又問道前日的張兄在家麼李君文道張敝友這兩日倒也在捨下養病李君文就同劉有美一徑到家來吩咐小的們去請張相公出來劉相公在此小的們進去説了張良卿聽得誤認是柳友梅不敢出頭小的連催幾次躲在內書房聲也不應了李君文見不出來只得自進來道老張不是那小柳是劉有美出來何妨張良卿道我只道是小柳不敢出來李君文道若是他我已先與你回了張良卿便同李君文出來相見過劉有美道雪小姐的事已變卦了二兄可曉得麼張良卿道小弟有些賤恙連日杜門未知其詳托李兄打聽不道幸遇吾兄劉有美道雪太守招小柳為壻前日録科案上取了他是第一這便無私而有私了李君文道我兄一定想必是超等了劉有美道哪里還輪到小弟小弟已在孫山之外了張良卿道吾兄大才為何也被遺落這便不要怪也不取小弟了劉有美道原來兄也見屈可惡可惡李君文道屈已屈了如今卻有什計較劉有美道依小弟算計須弄他一個大家不得方出我氣張良卿道如何弄個大家不得劉有美道近聞朝廷有採辦宮女之説小弟現拜在嚴太師門下到京中可把梅雪二小姐的天姿國色吹在他耳朵裏梅雪二老兒素與嚴太師作對今梅老已死雪老孤立無援待他動一疏再把雪老拿進京師然後降一旨意把梅雪二小姐點進宮來這便大家不得了李君文拍手道好計好計若如此任憑那柳生妙句高天下陪了夫人又折兵只是到嚴府中去須要備些禮物別件看不上眼必是些金珠玉玩才動得他張良卿道既要出氣也説不得了劉有美道若是禮盛些還可與嚴太師處討個前程出來還做得官哩張良卿道既如此我有明珠一顆現具黃金十兩拿去打杯再拿些銀子就央老李與我去覓些玉玩骨董明日就同劉兄起身進京總是如今科甲甚難謀個異路前程也罷便留劉有美在家裏住下把些銀子就央李君文去買玉玩自己又收拾些鋪陳行李停當雇了船次早就同劉有美起身進京不題正是盡道人謀勝誰知天意堅天心如有定謀盡總徒然因這一去有分見塞北他年走孤飛之才子江南異日增落魂之佳人未知日後何如且聽下回分解
