body:
  text: 第六回合歡亭入夢逢巫女詩曰淡雲疏雨恣高唐一種幽情入夢中漫説黃粱清俗士試看蝴蝶化周郎紅樓粉面原虛幻翠閣蛾眉半醉鄉莫向春風沈意樂離迷魂斷楚襄王卻説柳友侮只為心上想著那二美人左思右想了一回不免神思困倦才朦朧睡去忽走到一座花園四周花木一帶槿籬環抱著曲池流水瀠繞著石徑斜橋半中間高高的起一座亭子那亭子靠著一塊太湖石太湖石畔罩著一大株緑萼梅玲瓏曲折香氣紛披柳友梅飄飄然隨著池畔曲欄一徑從石路上灣灣地走過板橋只見那些牡丹亭芍藥欄大香棚薔薇架木樨軒周圍繞著那座亭子亭子上梅花如雪香氣連雲柳友梅徘徊不忍別去正是似隨殘霧似隨潮花岸依然舊板橋竹徑朱扉風半啓紙窗梅影月空搖紅餘珊枕叉寒禺緑東牆韻冷簫夢裏只疑身是阮階前妒殺翠雲條柳友梅到得亭子邊心上恍恍惚惚就於那亭子下面小石磴上坐憩片時只見亭子上寫著合歡亭三字兩行挂著一對聯就是柳友梅自己的詩句吟成白雪心如素夢到梅花香也清柳友梅看見吟罷心下想道原來這裏卻有人寫著我得意的詩句只可惜那樣一個仙源恨無仙子過耳心下才這般想但聽得半空中一派仙樂聲音嘹亮柳友梅側耳聽來但聽得悠揚逸響分明皎月度琴聲宛轉清音一似冷月飄笛韻幽情欲動處乍疑司馬遇文君曲韻聽來時還擬張生押崖女新聲送入高唐夢化作巫山一片雲柳友梅方才聽罷擡頭仰望只見幾個青衣擁著兩個仙女乘雲冉冉而下一個身穿著縞素衣裳駕著一朵紅雲一個身穿著淡緑色衣手執碧玉如意俱從半空中墮將下來柳友梅此時心下又驚又喜不免仔細定睛一看心下尚依稀仿佛記得像那船上相逢的二美人暗喜道吾柳友梅不知何緣與二美人便在這裏相逢遂上前問道敢問仙姬降臨何處因什到此那白衣的女子道妾乃瑞雲洞六花仙子是也那緑衣的女子道妾乃碧玉洞五花仙於是也與郎君共有姻緣之份故爾到此白衣女子道且待妾開卻洞門與仙郎歡會説罷將長袖從石壁上一拂只見石壁內就現出兩扇朱扉內中雕欄畫檻瑤草奇花迥非人境那白衣女子道仙郎請進柳友梅聽得喜出望外便笑臉相迎二女子亦攜手相邀同入洞中怎見得洞房的好處但見繡簾飄動錦帳高張排列的味味珍羞儘是瓊漿玉液端供著煌煌炬燭賽過火樹銀花香焚蘭麝暗消宋玉之魂衾抱鴛鴦深鎖襄王之夢酥胸微露處笑看西子玉床橫醉眼俏傳時嬌手曼楊妃春睡起正是未曾身到巫山峽雨意雲情已恣濃柳友梅隨著二女子到得洞中已覺神魂飛蕩又見洞房無限好景真令滿心歡暢樂意無窮回説道不知小生何緣過蒙仙姬錯愛至此二女子道郎君乃天上仙姿妾等亦非人間陋質與郎君共有良緣今幸相逢共酬夙願耳柳友梅道只恐凡夫汙質有沾仙體那二女子道此系天緣不須過遜話畢二女子就親施玉手捧著兩杯酒遞與柳友梅柳友梅接在手便覺異香撲鼻味沁心與尋常世上的酒味大不相同才飲下喉便陶然欲醉起來友梅飲罷橫著醉眼看那二女子那二女子果然丰姿絶世骨態鮮妍一個個露出萬種的風情千般的韻致反來引誘柳友梅柳友梅見了不覺魂飛魄舞身體都把捉不定便倒入二女子懷中那二女子便扶起柳友梅同歸羅帳共入鴛衾大家解衣寬帶遂成雲雨之歡但見羅衫乍褪露出雪白酥胸雲鬢半偏斜溜嬌波俏眼唇含豆蔻時飄韓椽之香帶綰丁香宜解陳王之癿柳眉顰柳腰擺禁不起雨驟雲馳花心動花蕊開按不住蜂狂蝶浪粉臂橫施嫩松松抱著半灣雪藕花香暗竊嬌滴滴輕移三寸金蓮三美同床枕席上好逑兩女了雙娥合衾被窩中春鎖二喬歡情濃暢處自不知夢境襄王樂意到深時勝過了陽臺神女正是幻夢如真情癡似夢柳友梅先摟定緑衣女子與他交歡只見那女子顔色如花肌膚似雪柳友梅摟定香肩團成一片但覺枕席之間別有一種異香似蘭非蘭似蕙非蕙像在那女子心窩裏直透出皮膚中來的柳友梅與他貼體交歡聞嗅此香便遍身酥麻起來笑問道仙姬遍體異香不知從何處得來幾令小生魂殺那女子微笑道仙郎貪采花香如縱蝶尋花恣蜂鎖蕊使妾萬種難當滿身香氣亦被君沾染去矣柳友梅便輕輕地撲開花蕊深深地探取花心只見那女子花心微動便嬌聲宛轉俏眼朦朧露出許多春態柳友梅不覺魂消雖則春情如醉尚留後軍以圖別陳回顧那白衣女子嬌羞滿眼春意酥慵似眠非眠似醉非醉的光景卻也像楊妃春睡的在那裏了柳友梅見了不覺雨意轉濃雲情復起便再整旗槍決戰捧著那女子道仙容傾國傾城能不魂消心死白衣女子道仙郎風流情態動蕩人心陽和透體遍骨酥麻叫奴一腔春思亦都被君泄盡説罷將女子分開玉股聳起金蓮覺花心微動即湊上前來柳友梅極力地奉承溫存地摩弄但覺舌吐丁香胸堆玉蕊已不知消魂何地卻又露滴牡丹心了雲雨既畢那柳友梅尚捨不得二女子二女子也捨不得柳友梅便一個捧著柳友梅的前心一個捧著柳友梅的後背把友梅擁在中間柳友梅覺得粉香膩玉貼體尉肌便渾身逋泰透骨酥麻如在隋煬帝任意車中不知風流快活為何如矣正在歡樂之際忽聽得曉鍾敲響驚得一身冷汗覺來乃是南柯一夢但聞數聲清磬又見半窗殘月那二美人不知向何處去了此時已是五更時候靜如老和尚起來做早功課了柳友梅所以被他驚醒醒便醒了柳友梅心下想道這二女子分明是我在湖上相逢的美人今夜忽然夢見起來這姻緣或者有些意思麼又想到那合歡亭之樂尚戀戀念念捨不得二女子意欲入夢再尋哪曉得天色已明此時要起來又捨不得好夢要睡又睡不去只得心神恍惚如醉如癡擁著被呆呆地坐在床上想那二美人倒忘了昨夜花園月下之約了正是楚峽雲嬌宋玉愁月明溪淨映銀鈎襄王定是思前夢擬抱霞衾上玉樓卻説靜如老僧做完了早功課就走到柳友梅房中來問道柳相公昨夜安寢麼友梅道昨日偶得一夢正要待師詳察靜如道夢見什麼來柳友梅道昨夜夢見起到一座花園四圍花柳滿屋梅香小生在彼遊玩只見半空中一派仙樂降下兩個仙女一個身穿縞素駕著一朵紅雲口稱六花仙子一個身挂緑衣手執著碧玉如意口稱五花仙子從空而下我與他飲酒交歡正在興濃之際卻被鐘聲驚覺不知主何吉凶靜如暗點點頭笑道柳相公這姻緣事有些意思了柳友梅忙問道卻是為何願詳其説靜如道柳相公你是讀書人最聰明的豈不知六花是雪五花為梅這分明梅雪爭春的意思了柳相公的姻緣想不在梅邊定雪邊矣柳友梅恍然大悟道聞師之言如夢方覺如醉方醒既已良緣有在我柳友梅便蹈湯赴火亦所不辭只恐好事多磨良緣難遂耳靜如道柳相公你不須憂慮本庵伽藍菩薩簽訣最驗可把婚姻事往問一問便知端的了柳友梅道正該如此隨即梳洗過走到神前拜了四拜通誠鄉貫姓名年月心事將籤筒搖上幾搖不一時求著一簽上寫道五十功名心已灰哪知富貴逼人來繡幃雙結鴛鴦帶葉落霜飛寒色開柳友梅看見驚歎道神明之言卻與老師所詳有些暗合但不知應在何時靜如道據此簽看本當應在秋冬之際這姻緣兩重不須説了但必要餘榜題名然後洞房花燭哩柳友梅道若到此日當重修廟宇再整金身靜如道這個自然到後日應驗了方信老僧不是誑語柳友梅拜謝過便欲別去靜如道豈有此理且請用過早膳去柳友梅只得坐下吃過飯然後別去尋那張李二生再看雪小姐的真詩正是朝雲深鎖梨花夢夜月空間緑綺心不向幽閨尋女秀世間何處覓知音畢竟柳友梅與二小姐如何作合且聽後來分解
