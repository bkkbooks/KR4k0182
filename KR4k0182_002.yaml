body:
  text: 第二回柳秀士舟中題句詩曰世間真偽不相兼只為才情賦自天班馬文章由夙慧庚鮑詩句實前緣牙琴須遇知音解卞玉還逢識者憐不是美人親聽得空令雅韻落前川話説柳友梅到了次日乃是二月花朝天氣晴和鶯花繚亂那花間的百鳥嬌滴滴在枝上弄晴柳友梅書齋曉起不覺遊興勃勃又急要曉得那雪太守詩題的意思記得夜來竹鳳阿約遊西湖隨即梳洗畢吃過早膳身上穿一領水墨色衣頭戴一片氈巾手執一柄棕竹扇子腳上穿一雙紅方舄鞋飄然有淩雲氣概真濁世之佳公子也稟過母親就叫抱琴跟了一徑到竹鳳阿家來恰好才到中途望見竹鳳阿已同著楊連城劉有美駕著蘭舟迤邐地蕩將過來抱琴先看見叫道竹相公哪里去家相公在此竹鳳阿道來得正好抱琴先跳上船把纜系在緑楊之下隨接了柳友梅下船竹鳳阿見了柳友梅因説道昨晚相約今早見天氣好弟恐辜負花晨特駕小舟屈了楊兄劉兄與吾兄同往西湖一遊不道吾兄先已移玉可謂知己有同心也楊連城道這才是有約不忘劉有美道晚詩題想今日定要做了但友梅兄可要曉得那詩題的意思麼説起來只怕友梅兄不喜殺還要想殺哩柳友梅道詩題的意思弟實不知今日正要請教鳳阿兄難道兄已預先曉得了麼劉有美道小弟倒已預先打聽著了才與二兄説過風阿兄也道如是如是不差不差若友梅兄要我説昨日罰小弟的酒今日要吃還我若不吃小弟只推不知罷竹風阿道這個容易不一時舟人排上酒來竹鳳阿道劉兄且請飲一杯潤潤喉才説不妨劉有美道兄等難道倒不吃竹風阿叫將大杯來斟上酒遞與劉有美次連城次友梅最後自己也篩了一杯奉陪單有劉有美的酒量原高拿起酒一飲而幹一連飲了數杯乘著酒興説道昨日詩題兄等道是哪個出的柳友梅道是府裏出的學裏傳來的劉有美道是學裏傳來的卻不是府裏自出的柳友梅道怎麼不是府尊出的卻又是誰出的劉有美道小弟也不知昨晚別後小弟一向有一相熟的舊鄰現在杭州府做書手府中消息都曉得昨日返舍就遇著他在捨下了小弟與他偶然談及他對我説詩題是太爺的一位小姐出的你道天下有這樣聰明女子麼可不令人想殺柳友梅道原來如此怪不得兄要著魔矣這樣説起來那小姐一定能詩的了但世上難得才色兼全的女子有才者未必有貌有貌者未必有才即或有貌有才而無一種才貌的風情韻致亦與無才貌者等有才無貌不可謂之絶色佳人有貌無才不可謂之女中學士有才有貌而風情或減韻致歉然亦如嚼蠟便無味矣那小姐有沈魚落雁之容閉月羞花之貌不惟女工針指件件過人至於詩詞一事尤其所長就是雪府尊刻的嘯雪集倒有大半是小姐吟詠的難道不是才色兼全鍾情女了麼竹鳳阿道兄知其一未知其二雪小姐的才貌果然是仕女班頭但我敝年伯的意思必要配個文章魁首為此出這詩題雖試士實欲擇壻耳柳友梅聽説心上也不覺暗暗歡喜想道我柳友梅若題破了雪小姐的詩題便不患佳人難遇矣便一心想著雪小姐不覺詩興勃勃如有所得對著竹鳳阿道既如此當吟成才士句接續美人緣也竹鳳阿道正是今日乘此春光賦詩飲酒亦一樂事且請吟詩楊連城道詩不成者罰酒三巨觴劉有美道小弟詩是決做不出的倒情願罰酒小弟昨夜間此好消息想了一夜有了頭沒了尾有了尾沒了頭不覺沒心緒起來今早倒擱筆不題索性養養精神好若吟一首如今決做不出的了柳友梅道昨日尚未請教今日正該同詠楊連城道若無佳句曷謝良辰正該同做竹鳳阿道即如此請各揮毫抱琴就在拜篋中取出文房四寶四人各分了紙筆只見竹鳳阿注目花箋搜索枯腸楊連城拿著一管筆口裏唧唧噥噥地吟哦劉有美也下做聲拿著酒只顧飲舉起觴不住吃只有柳友梅也不想也不寫也不飲酒立起身往船頭上散步遙望那四圍山色一帶花光不覺詩思撲撲從天外飛來喜動眉宇便叫抱琴取過紙筆頃刻寫成七言律詩二首真個是文成七步筆掃千軍腕下霎時興雲雨紙間頃刻走龍蛇柳友梅寫完了詩袖在袖中走入艙中問道三兄詩俱完了麼劉有美道兄怎麼不去做詩反去問望三杯頭是不饒你的柳友梅道弟實不才詩己粗成劉有美道這樣險韻兄難道完得如此神速竹鳳阿道柳兄才極敏捷他若詩成尚未知鹿死誰手小弟詩雖胡湊尚欠推敲楊兄佳句已完亦未寫出柳兄既已詩成何不賜教柳友梅就在袖中取出與三人看劉有美接在手中叫道友梅兄果然做了大奇大奇可謂真正才子竹鳳阿笑道真正才子合配個真正佳人楊連城道相配時這詩題分明是姻緣簿了衆人都挨攏來看只見上寫道其一春閨雨意迷離鎖隔溪絲絲飄墮濕花西風聲遠浦驚歸雁片刻巫山促曉雞煙影半灣情欲繞波光千頃恨還齊畫欄整日凝眉望船隱垂楊鳥自啼其二春郊雨余淑氣滿幽幽絲柳迷花隔路西風日弄晴飛蛺蝶片雲凝彩墮山雞煙籠野寺春光媚波漾汀蘆秀色齊畫裏文章看不盡船歸月落亂烏啼三人看了大加讚歎竹鳳阿道柳兄今日此詩不但敏捷異常似有神助且字字清新俊逸句句如織錦回文可謂李杜復生庾鮑再出矣敬服敬服小弟輩當為擱筆柳龍梅道小弟俚句也是一時興致所作正要拋磚引玉何故吝惜珠璣楊竹二生道珠玉在前自慚形穢其實不敢獻醜每人情願罰酒三杯劉有美道友梅兄如此奇才雖曹子建七步成詩哪得精工到此明日送到府裏裏難道不動小姐的火我們大家也奉柳兄一杯挂挂紅何如衆人道説得有理該奉該奉三人先吃了罰酒然後各人奉柳兄一杯友梅酒量原不甚大一連吃了數杯自覺有些酒意不免推開船去臨風散玩楊連城與竹鳳阿亦倚著相陪不覺船已過錢塘江那西湖的景致已在目前只有劉有美留心把柳友梅二首詩不住地吟哦假意地歎賞心下實要念熟了好抄襲他的卻好船已到湖湖上煙花如市士女如雲説不盡的景致昔人有詩單贊那西湖的景致詩雲山色波光步步隨古今難畫亦難詩水浮亭館花間出船載笙歌柳外移刺眼繁華如錦繡引人春興似遊絲六橋幾見輪蹄換湖上於今泛酒卮其二萬壑煙霞映遠峰水光山色畫圖中瓊樓燕子家家市錦浪桃花岸岸風彩舫舞衣凝暮紫繡簾歌扇露春紅蘇公堤上垂楊柳尚想重來試玉驄卻説是日湖中因有官船設宴小舟倒不甚多自斷橋至蘇公堤但見一帶垂楊與桃花相映且是年春雪甚盛梅花為寒所勒與桃杏相次開發尤為奇觀緑煙紅霧迷漫二十餘裏歌吹為風粉汗成雨紈褲之盛多於堤畔之柳豔冶極矣至於朝陽始出夕春初下月華與山色爭妍霞影與湖光並媚一般好景更極天然三人觀賞不盡只有劉有美把柳友梅詩句只管吟哦酒後聲高不覺吟詩之聲震於四野隨著順風兒一句一句竟飄向隔船艙玉人耳朵裏去了但見隔船簾內隱隱綽綽有幾個美人窺探最後一侍兒從傍邊揭起垂簾恰好柳友梅扯著劉有美道劉兄為何這般好景不看只是吟詩那侍兒揭簾時簾內兩美人剛剛與柳友梅打個照面只見那一個美人眉舒柳葉眼湛秋波身穿著淡淡春衫宛似嫦娥明月下裙拖著輕輕環猶如仙子洛川行遠望時已消宋玉之一近觀來應解相如之渴又見那一個美人貌凝秋月容賽春花隔簾送影嫣然如芍藥籠煙臨水含情宛矣似芙蕖醉露雖猶未入襄王夢疑是巫山雲雨仙柳友梅望見神馳了半晌方説道人家有如此標致女子豈非天姿國色乎昔人雲欲把兩湖比西子今則欲把西子比西湖矣劉有美也驚歎道果然天姿國色絶世無雙竹風阿道但不知此是誰家宅眷柳友梅道莫非就是雪小姐麼楊連城道觀其舉止端詳大約非小人家兒女竹鳳阿道若果是他正友梅兄所説才色兼全的女子矣但這樣女子得一尚難如何有兩劉有美道好歹明日訪他個下落回去四人説説笑笑不覺金烏西墜玉兔東升那官船兒早已開去是夜月色如銀夕嵐如碧四人由斷橋至蘇公堤直至六橋步月而歸回到船中洗盞更酌盡歡方睡只有柳友梅自見了二美人之後心下想道若得如此佳人為婦我柳友梅便三生有幸矣但不知他是誰家宅眷又見朋友在船不好十分著相睡在船中卻一夜不曾合眼正是山色有情留客賞湖光無意戀人遊東風似與才郎便飄墮詩聲到隔舟未知後來如何且聽下回分解
