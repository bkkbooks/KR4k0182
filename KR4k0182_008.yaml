body:
  text: 第八回慧文君識眼辨真才詩曰琴聲曲曲動文君識得當年司馬心自古佳人懷吉士由來才子遇閨英靈機一片原相照慧眼千秋好細尋鳳鳥於飛凰自合等間豈許俗禽侵卻説劉有美已抄襲了柳友梅的詩送到學中次日周榮就將張良卿的倒換詩一同有美混雜送進真個神不知鬼不覺把柳友梅一個真正才子的名字反暗裏遺落了話分兩頭且説如玉小姐自梅公去後就住在雪太守衙齋終日與瑞雲小姐一處梅小姐見雪小姐顔色如花才情似雪十分愛惜雪小姐見梅小姐詩思不群儀容絶世百般敬重平日間不是你尋我問奇便是我尋你分韻花前清晝月下良宵或同行攜手或相對憑欄如影隨行不離頃刻説來的無不投機論來的無不中意只是如玉小姐因想著父親遠任又聞閩寇未寧每每寢不安席食不甘味或是思量了或是説及了生生掉下淚來枕席間亦每有淚痕雪小姐時常來勸慰他只是至情關係哪里放心得下正是事不關心關心者亂顰首有意不語誰知一日梅小姐新妝初罷穿一件淡淡春衫叫侍兒朝霞跟了走到亭中曲欄邊海棠樹下摘花只見一雙粉蝶輕輕地飛過牆來點綴著春光十分蕩漾那侍兒朝霞道小姐你看好一對雙飛的蝶兒那梅小姐注目一看笑道果然好一對雙飛蝴蝶朝霞就將扇子兒一撲不料竟撲入梅小姐懷中梅小姐道你看蝴蝶一般好有情也恰好雪小姐悄悄地走將來看見微笑道閨中韻事姐姐奈何多要占盡今日之景又一美題也梅小姐也笑道賢妹既不容愚姐獨占又愛此美題何不見贈一詩便平分一半去矣雪小姐道分得固好只恐點染不佳反失美人之韻又將奈何梅小姐道品題在妹姐居然佳士雖毛遂復生亦復何慮雪小姐忙取紙筆題詩一首呈與梅小姐看只見上寫著七言絶句一首美人撲蝶繡罷春綃意惆然淡煙籠日媚花間間將團扇招飛蝶似愛雙飛故倍憐梅小姐看畢歡喜道瀟灑風流深情遠韻令人思味無窮若賢妹是一男子則愚姐願侍中櫛終身矣雪小姐聽了把眉一蹙半晌不言説道小妹既非男子難道姐姐就棄捐小妹不成此言殊薄情也梅小姐道吾妹誤矣此乃深感賢妹才華欲得終身相聚而恐不能故作此不得已之極思也正情之所鍾何薄之有雪小姐道終身聚與不聚在姐願與不願耳你我若願誰得禁之而不能梅小姐道慮不能者正慮妹之不願也妹若願之何必男子我若不願不願妹為男子矣雪小姐方回嗔作喜道小妹不自愧其淺反疑姐姐深意真可笑也只是還有一事我兩人願雖不遠然聚必有法但不知姐姐聚之之法又將安出梅小姐道昔日娥皇女英同事一舜姐深慕之不識妹有意乎雪小姐道你我才貌雖不敢上媲皇英然古所稱閨中秀林下風應亦不愧但必配得一個真正才子方諧夙願不知何日相逢雪小姐道湖上之吟言猶在耳舟中之句何日忘之姐姐難道倒忘了麼梅小姐道非敢忘也恐良緣不偶好事多磨耳雪小姐道松柏歲寒不改其操梅花雪壓不減其香自古貞姝靜女此心始終不渝此十年待字大易所以著有貞也況天下事遠在千里近在目前昨聞爹爹説學裏詩篇只在早晚送來或者天緣有在此詩也送進來不遠在千里便近在目前乎朝霞從旁聽見也笑説道我看此生臨去以目送情將心致意一定也是鍾情人自然良玉顯投必不明珠暗棄二小姐不須過慮言未了一聲梆響門上扛進幾隻卷箱就是學裏送來的詩箋在內了二小姐聽見忙叫朝霞去看來朝霞去不多時隨與使女取進內房朝霞把卷箱開了二小姐忙取詩箋大家展玩翻來翻去並無一首中意的直看到後面只見一幅花箋寫著兩首詩句二小姐忙看一遍分明就是湖上相聞的忙看名字卻寫著山陰劉裴然題二小姐疑心便在錦囊中取出湖上相聞的詩句出來一對卻喜字字不差原來這日湖上聞吟之後二小姐各各有心都暗記了柳友梅的詩句回去便把二詩寫出將白松綾子繡成兩幅鴛鴦錦箋珍藏在身到這日取出來同看看來詩句一般只是字迹可厭梅小姐道這詩果然和得風流俊逸自然是個出色才人細玩其詞當是林和靖李太白一流人物只是字迹污濁並無妍秀之氣若出兩手恐有抄襲之弊雪小姐道這詩不獨上下限韻和得絶不費力而情辭宛轉詩句清新其人之風流鬱雅如在紙上只是妹也疑心既是才人必無能詩不能書之理都恐其中還有假處一邊説一邊又翻倒後邊又見一幅花箋寫著兩首詩二小姐同看了一遍梅小姐道那首詩卻也做得清新俊逸與前兩首倒像一個人所詠畢竟也是個風流才子雪小姐道只是詩句雖像出一手字迹又一般穢惡恐怕又非真作忙看後面名字卻寫著錢塘張白眉題朝霞聽見二小姐在那裏彼此相疑便説道朝霞雖不知詩巾意味但其人之風情韻致我朝霞目睹的畢竟詩思不群字體有致必無相反之理三人互相議論只因字迹醜陋便惹起許多疑惑正是閨中兒女最多情一轉柔腸百慮生忽喜忽愁兼忽憶等間費殺俏心靈二小姐又看到後邊又撿出第三幅詩箋上面卻只寫得一首春郊二小姐看了忍不住只管冷笑忙看名字卻寫著山陰柳月仙題雪小姐道這樣胡言也送了進來忒也可笑細看字迹也一般的寫不像樣梅小姐道看來詩中俱有疑惑要辨真假除非面試耳朝霞道老爺自然還要面試待面試時便一任姦觀難逃秦鏡了正説話間忽聽得一聲鼓響雪太守已退堂二小姐忙收拾詩箋將二幅好詩放在一邊將那首好笑的也放在下面好與雪太守看不一時雪太守進來看見二小姐在那裏看詩便問道你姊妹二人在這裏選詩中間有幾個有才的雪小姐道詩句雖多真才卻少雪太守笑道難道越地人才不足邀你二人一盼麼梅小姐就叫朝霞將這幾幅詩箋呈在案上雪太守隨展開第一幅詩箋看未終篇便驚訝道此異才也吾目中不見久矣不知何處得來卻為你二人選出縱有英妙自當讓此生出一頭地矣忙看姓名卻寫著山陰劉裴然題雪太守道原來異才反出在山陰我記得前日面見學院他對吾説山陰柳友梅是越中第一個才子本院在京時已聞其名今尚未曾面見這姓劉的卻也在山陰莫非就是那柳友梅麼只不知他可喚做這個名字雪小姐道孩兒輩也在這裏疑心雪太守道有什疑處雪小姐道孩兒輩疑其詩句雖佳字迹可厭其中恐有抄襲之弊雪太守暗點點頭又看到第二幅詩箋卻寫著錢塘張白眉題看了一遍也極口贊道得此詩可謂既生瑜復生亮矣與前詩井驅中原尚未知鹿死誰手只可惜字體一般都不佳耳雪小姐道後邊還有一個姓柳的也是山陰人字法也不佳詩句更可笑説罷便把第三幅詩箋呈與雪太守道爹爹你道可好笑麼雪太守也不待看完便道何物狂生如此胡言也送到本府這裏來可笑可笑雪小姐道看來詩句可疑爹爹卻如何區處雪太守道這個不難只消我明日面試一番便知端的矣況他二生詩才雖美不知文行何如若只是詩詞一路而幹舉業空疏品行不立後面只流入山人詞客裏去了也非久大之器我所以畢竟還要面試一番二小姐道爹爹所言深得觀人之法如此最好三人談笑間忽一聲梆響傳進一道文書雪太守看了原來是學院發考科舉的牌雪太守看過便道既如此我也不必另行復試了就此録科一事便好詳察真偽矣隨之吩咐禮房準備試卷限即日親臨考試不題正是流水高山思轉深玉堂金馬器難沈文君已具憐才眼司馬何愁空鼓琴畢竟雪太守面試何如且聽下回分解
