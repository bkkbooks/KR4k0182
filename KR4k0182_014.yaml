body:
  text: 第十四回為辭婚種禍邊庭詩曰姻緣富貴本由天何事姦謀強欲連靈鵲原非鴻鳥伴山雞豈入鳳群翩多才自古多情鍾忌士由來忌用賢誰料花皇自有主一番風雨一番鮮且説柳友梅探花及第瓊林宴後便要謁見相公也不免就要到嚴府裏去這一日去謁嚴相公嚴相公留茶因見柳友梅一表人才美如冠玉又是簇新一個探花欽賜翰林學士嚴相公便有了心相見後坐罷便問道原來賢契如此青年柳友梅道不敢門生今年二十有一嚴相公道前看序齒録上見賢契尚未授室何也柳友梅道門生因先京兆早亡幼孤無力因此遲晚嚴相公道原來如此如今再遲不得了我尚記得令先尊在京時與老夫朝夕盤桓情意最密只不曉得有賢契這等美才不日奏過聖上老夫當執斧柯柳友梅道這個何敢勞老太師吃了三道茶柳友梅就辭謝出來原來嚴相公有一內侄女就是要托趙文華昔日在山陰縣尋親的至今未配那時已嗣在嚴相公身邊因見柳友梅少年及第人物風流便就注意於他故此留茶詢問知他尚未娶親不勝歡喜明日就托趙文華説親趙文華此時已驟升至通政司了趙文華領了嚴府之命安敢怠慢隨即來見柳友梅二人敘了些寒溫客套趙文華便開口道嚴老太師有一內侄女今已嗣在太師身邊勝似己出德貌兼全妝奩富厚昨老太師見年兄青年甲第聞知未娶特托小弟作伐意欲締結朱陳之好此乃老太師盛意年兄大喜使弟得執斧柯不勝榮幸柳友梅道蒙老太師盛意趙老先生美情本不當辭只是晚弟已曾定過雪景川之女雖未行聘然已約為婚姻不好另就趙文華道雪景川之女尚未可必如今嚴太師當朝一品誰不欽仰況他美意諄諄眼前便是如何辭得柳友梅道雪公之女久已有約況他為著小弟受了多少風波背之不仁不敢從命嚴太師盛意萬望老先生為晚弟委曲善辭趙文華見話不入門搖著頭皺著眉冷笑笑道辭亦何難只恐佛了老太師的意不肯就是這樣罷的親事不成便有許多不便柳友梅道若説做官自有官評這婚姻事卻萬難領教趙文華道只怕還該三思不要拂了太師的意才好柳友梅道他事尚可通融這婚姻乃人倫紀法所關既已有求豈容再就只求趙老先生在太師面前多方復之趙文華見柳友梅再三不允別了柳友梅回到嚴府將柳友梅之言一一説了嚴相公聽説就是雪景川之女便道雪景川之女素有才貌去歲張劉二生到我門下時盛稱他二女姿容絶世才思無雙只是雪老執拗不肯輕易嫁人原來就與柳友梅約為婚姻只是我如今一個相國的女與他作伐也不算辱沒了他為何就回絶了我可好無理趙文華忙打一恭道老太師請息怒或者嫌卑職人微言輕不足取信另遣一媒去説他或肯從也未可知嚴相公道賢契尚不肯聽別人焉足取信我曉得他依仗新探花的勢看不上老夫我只叫他探花的帽可戴得成趙文華道老太師且不要著惱前聞老太師門下中書劉有美與他頗有舊誼老太師若遣他去説必一説即從嚴相公想一想道也罷待老夫先人盡了他就著堂後官去請劉中書來原來劉有美得借嚴府的力也謀做了一個中書這日聞知太師來請忙到嚴府伺候堂後官通報劉有美進見匍匐階下連忙打恭問道老太師呼喚有何吩咐嚴相公道就是新科的柳探花老夫有一內侄女意欲招他為壻昨曾托趙通政為媒去説他卻以定過雪景川之女來推託聞他與賢契有舊特此相煩劉有美道難得老太師這樣盛意柳探花既得為師門桃李今復乘相府鸞凰又何幸至此嚴相公歎道賢契如此説他偏看不上老夫前日竟把老夫回絶我也罷了只我想來我一堂堂相府要招一東坦也不可得豈不遺笑於人何以把握朝綱為此再煩賢契通達愚意他若肯時老夫自然俯從他若不肯也悉憑他只是叫他不要錯認了主意劉有美忙打一恭道待中書委曲去説以利害説之不怕他不從遂別了嚴公尋到柳友梅公寓長班將名帖傳進柳友梅曉得是劉有美心下想道一定此來又為嚴府作説客了忙出迎接二人喜笑相迎見禮畢劉有美道兩年契闊小弟無日不思今幸相逢然咫尺有雲涯之隔了不勝慶幸柳友梅道聞兄一向在嚴府中小弟入京便欲來訪但侯門似海拜見無從前日奉謁太師又不好造次相詢惆悵至今今幸遙臨曷勝快慰劉有美道吾兄致身青雲真個喜從天降今又有一大喜小弟一來奉拜一來就奉賀柳友梅道有何喜事劉有美道嚴太師願以令愛相扳豈非大喜柳友梅道姻緣自是喜事只是小弟已曾與雪景川梅道宏二公處約為婚姻是吾兄所深知的理無再就昨蒙令尊師趙老先生見諭小弟已力辭過何得又勞吾兄劉有美道梅雪二處終不比嚴太師這樣富貴他官居宰輔執掌朝綱生殺豫奪一出其手吾兄得為東但難道不勝似梅雪二處的姻緣麼況且是太師有意相求像小弟輩求之亦不可得柳友梅道小弟生平于功名富貴實實看得淡斷不以窮達而移其志至於婚姻有約乃人倫紀綱所關亦豈敢以始終而二其心況小弟于梅雪二處的姻緣已不知受了多少風波現今雪公尚為小弟受無故之禍小弟何忍背之劉有美聽説到此不覺打著心事紅了臉只得又勉強説道吾兄堅執不從也難相強只恐觸怒于嚴太師有所不便耳柳友梅道禍福自有天命小弟斷不以利害而易初心劉有美笑笑道兄翁真鍾情人小弟多言倒是小弟得罪了説畢二人遂相別去到次日柳友梅就來回拜劉有美劉有美又勸道兄翁于梅雪二公的婚姻雖然有約然實未曾行聘兄翁何執意如此況今雪公之事尚未了局梅公又已故世如今嚴太師炎炎之勢舉朝憚服兄翁若舍嚴府而就梅雪是猶舍珠玉而取瓦礫且拂其意這倒於雪公身上一發不便是雪公的事因婚姻而起復因婚姻而轉盛了吾兄還宜三思柳友梅道小弟愚癡出於至性詩不雲乎我心匪石不可轉也我心匪席不可卷也止小弟與梅雪二公之謂矣嚴太師之命萬難從命望為轉辭劉有美百般地勸誘柳友梅百般的苦辭劉有美只得回復了嚴相公將往後的言語一一説了嚴相公道這畜生好無禮這且由他我且有處正是林不得香蜂蝶恨留春無計燕鶯羞花枝失卻東皇意雨雨風風哪得休卻説嚴介溪見不從親事懷恨在心恰好遇著邊報緊急北人遣使來議河朔一事奉旨要差人往北議和嚴介溪想一想道這畜生不受擡舉前日他説不以利害易心專意在梅雪二處的姻緣我就叫他翁壻二人不怕利害的去走遭只怕那時來求我姻親也就遲了算計已定次日便暗暗將二人名字奏上旨意下來將雪景川立功贖罪加了兵部侍郎的職銜將柳友梅加了翰林院學士的職銜充作正副使奉命往北共議河朔兼講和好限五日內即行回朝另行升賞旨意一下早有人報到柳友梅寓所來柳友梅聞知心下呆了一呆暗想道這一定嚴嵩陷我了但我去也罷如何又陷纍我嶽父我翁壻二人一去後把我梅雪二處的姻緣不知又如何結局矣正躊蹰間忽報外面竹老爺楊老爺要見柳友梅忙出迎接相見過竹鳳阿揖也不作完就説道有這等事小弟方才見報方曉得吾兄翁壻要出使北庭這只是誰人陷害楊連城道小弟尚不知頃間鳳阿兄來方知有此奇事只不知又是哪里起的柳友梅道就是嚴府為小弟辭婚一事起的禍端然目今聖旨既下即系君命做臣子的豈可推託只是我嶽父暮年怎當此塞外馳驅之苦內弟又甚年輕無人可代如何是好竹鳳阿道不要説令嶽年高難去就是吾兄以白面書生奉使北鄙良不容易楊連城道正是吾兄文士匹馬馳驅深入不毛又況正當暑天將近酷日炎蒸胡沙卷尤如何去得柳友梅道以身許國死生禍福惟命是從只是小弟上有老母內無弟媳將尋梅問柳的姻緣空拋撇在天涯為可惜耳言念及此轉不覺兒女情深英雄氣短矣三人正説間只見長班又進來稟遣雪太老爺小老爺來了柳友梅忙出迎進雪公先與楊竹二生見過然後雪蓮馨柳友梅一一俱見過了雪公忙問道這風波不知又是哪里起的又是誰人陷我二人柳友梅道小壻才與楊竹二兄説來此乃嚴府又因小壻辭婚起的雪公道卻是為何柳友梅就將趙文華為媒及劉有美説親的事一一説了一遍雪公道原來如此但今已奉皇命就是朝廷的事了捐軀赴國本臣子份內的事亦復何辭只是我兒雖已成名尚屬年幼二女又遠在故鄉就是賢壻也上有老母內無兄弟此番一去吾與賢壻匹馬胡沙尚不知死生何地未免回首淒然言至此雪公不覺撲簌簌掉下淚來柳友梅與雪蓮馨亦泫然淚下竹鳳阿楊連城亦為之動容悲切雪蓮馨因含淚説道據孩兒想來爹爹可以年老病辭柳姐夫亦可以養親告假何不同上一疏或者個中猶可挽回雪公歎道國家有事若做臣子的如此推託則朝廷養士何用生平所學何事我想漢朝蘇武出使北廷拘留一十九年旌毛盡落鬢髮盡白方得歸來宋朝富弼與契丹講和往返數回得家書不開恐亂人意這多是前賢所為你為父的雖不才也讀了一生古人書做了半世朝廷官今日奉命北往豈盡不如前賢願為臨難退縮貽笑當世乎柳友梅道此番一行風塵勞苦死生患難固未可料然做臣子的功名事業必不由此一顯此盤根錯節之所以見利器也吾人舉動乃關一生名節貪生畏死斷使不得竹鳳阿道在蓮馨兄身上愛親心切故作此不得已之極思在老年伯及吾兄身上愛君之心更切故有此論君親雖曰不同忠孝本無二理耳楊連城道若到日後歸來功成名遂君親具慶忠孝雙全又可成一段千秋佳話矣説罷雪公隨吩咐雪蓮馨道我與你姐夫去後你便可告假回鄉間楊兄已選蘇州司李或順便就同楊年兄歸去善慰母親好生安慰二位姐姐叫他們不必憂煩我去倘能不辱君命歸來歡會有期柳友梅也就把家中事體托與楊連城得知隨吩咐抱琴道在老夫人面前只説我在京候選切莫説出使邊庭的事恐怕驚壞了老夫人抱琴領命不題次日雪公與柳友梅翁壻二人就辭了朝領了書帶了兩個能事家人把鋪陳行李發在城外館驛中住下此時京師衙門常規也有公餞的也有私餞的亂了幾日竹鳳阿與楊連城也同設了一席餞行過了雪公竟同柳友梅往北而去卻説雪蓮馨送了父親去後隨即告假還鄉省母恰好楊連城選了蘇州府理刑領了憑要出京雪蓮馨即著抱琴約了一同起身下去竹風阿卻授了禦印總兵之職也往沿邊一路鎮守去了正是摧鋒北陷穹廬去避禍南遷故土來誰為朝廷驅正士姦人之惡甚於豺畢竟柳友梅與雪公如何歸來與梅雪二小姐又如何作合且聽後來分解
