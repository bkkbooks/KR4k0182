body:
  text: 第十五回擲金錢喜蔔歸期詩曰天涯海角有窮時惟有相思無盡期殘夢樓頭空自憶離愁花底問誰知雲山深鎖真情恨風雨翻成薄命詞我向鱗鳴占信候金錢擲破歎歸遲卻説梅如玉雪瑞雲二小姐自雪公去後就與雪夫人回蘇原來雪公的舊宅在蘇州府桃花塢中回家住下只要打聽雪公的消息後聞雪蓮馨柳友梅與竹鳳阿入京去挽回了心下終寬捱過了殘冬直到歲底才有信來知雪公的事已漸平安方覺放心及至春闈忽報雪蓮馨中了進士柳友梅中了探花母女三人真喜出望外滿心歡暢只道不日衣錦還鄉便可乘鸞跨鳳哪曉得過了數月反無音信起來不知為著何故母女三人又不勝憂悶雪老夫人對著二小姐道自你父親去後已近一年幸天保佑無事更喜兩登科第實為望外但不知到今數月為何反無音信瑞雲小姐道去歲憶分袂臨別見青楊如織今年又望緑柳成蔭因什緣由魚沈雁杳如玉小姐蹙著眉無言無語半晌才説道雲山修阻煙水蒼茫徒令人目斷長安不知歸舟何日昔時守孝情長今覺思親倍切雪夫人道我聞銀燈頻剔喜占音候金叉可當為問歸期何不尋一蔔士問之二小姐道如此甚好就叫朝霞在門首去看來朝霞走出來站立門首不一時只見一個起課先生手中搖著課筒過去朝霞一看只見那先生頭頂方巾透腦油海青穿袖破肩頭面皮之上多麻點頸項旁邊帶癭瘤課筒手托常作響招牌腰挂不須鈎誰知外貌不堪取腹裏仙機神鬼愁朝霞立在門內遠遠望見他腰間挂著一個小小招牌上面寫著李半仙課精鬼神相善麻衣朝霞想道這個先生一定又會相面又會起課的了遂叫聲起課先生這裏來那李半仙見有人請他忙走過來進了門走到中堂坐下朝霞就進去報與夫人二小姐知道二小姐就隨著夫人一徑在廳堂後來看他起課李半仙見夫人出來便問道夫人要起課麼雪夫人道正是要起課且問先生就定居在此還是新來到的李半仙道在下到處起課哪有定居前往紹興山陰縣去了幾日偶到這裏夫人道可認得山陰新探花柳老爺家麼李半仙道柳老爺是我大恩人夫人卻如何認得夫人道就是我家老爺的小壻今日起課也是為他李半仙道如此就是前任杭州府雪太守貴壻夫人道你為何就曉得李半仙道柳老爺未中時曾在捨下住過一宿在下前日自他家裏來柳老爺真是好人我曾受他大恩未曾報德昨我在街上聽得有人傳説他出使邊庭不知此信可確我也要訪他一個真信夫人驚問道為什出使邊庭起來李半仙道在下也不知何故也是道聽途説不知可真前日他老夫人也曾叫我起一課看起來此信竟像真的我今因奉他老夫人之命一路賣蔔進京訪問因此在這裏經過不期又遇了夫人雪夫人道如此你且與我起一課看李半仙就將手中課筒遞與朝霞朝霞送與老夫人夫人對著天地暗暗地祈占了一番仍叫朝霞遞還李半仙李半仙拿在手中搖來搖去口中念些單單單折折折內象三爻外象三爻的儀文不多時起成一課李半仙道不知夫人何用夫人道問歸期李半仙道是個未濟卦未濟終須濟日下雖不能歸然終有榮歸的日但妻占夫卦官爻不發動倒是子孫文書爻動了又臨騰蛇白虎一定還有虛驚自身尚不能歸或是音信或是子侄預先有個歸來了雪夫人道只是我考爺的歸期在於何日李半仙把手掄一掄道今年不歸直要等坎離交濟來歲春夏之際方許歸期雪夫人道為何要到來年李半仙道卦上是這般發見連我也不知其中緣故我只據理直談便了夫人又叫朝霞取過課簡又禱一番遞與李半仙李半仙重排爻象早又起成一課卻是個纂卦李半仙道夫人這又何用雪夫人道婚姻李半仙道纂者遇也又婚姻也這婚姻已有根了絶妙的一段良緣他日夫榮妻貴只嫌目下稍有阻隔也臨騰蛇爻上畢竟也有一件虛驚更有一種奇妙之處又是兩重婚姻雪夫人聽了與二小姐道那先生起課果系是半仙了我又不曾與他説他又不曉得如何便説是兩重姻緣只不知姻緣成在何日因又問道姻緣應在何時李半仙又把手掄一掄道據卦看來也要到來歲秋間可成李半仙起完了課因又笑道在下不但會起課且精相理似老夫人這般相貌日後要受三封誥命貴不可言只是目下氣色稍帶阻滯尚有一段驚憂過了今年來春便喜從天外降恩向日邊來矣隨指著朝霞道像這位姐姐也有些福氣在面上後有個貴人擡舉哩説罷便要告辭起身雪夫人叫留便飯隨進來命二小姐寫了封家書順便寄他帶去又封了一封銀子隨出堂來李半仙才用過飯雪夫人叫朝霞傳語囑咐道有勞先生家書一封付寄到京謝儀一兩權作酬資李半仙道家書附帶當得酬儀斷不敢領耳再三推了幾次李半仙方才取了竟飄然而去正是天地有先機世人不能識直到應驗時方知凶與吉卻説李半仙去後雪夫人與二小姐因聞差出使邊庭的話心上又添了一段憂疑遂叫家人往外邊打探並到報房看報何如未知家人去後何如且聽下回分解
